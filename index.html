<!DOCTYPE html>
<html lang="pt-BR" class="antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Central de Cálculos de Leilões e Imóveis</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>

    @page {
      size: A4;
      margin: 10mm;

    @media print {
      body {
        background-color: white !important;
      }

      * {
        background-color: transparent !important;
        color: black !important;
        box-shadow: none !important;
        text-shadow: none !important;
      }

      .print-hide { display: none !important; }
      .print-page-wrapper { margin: 0 !important; padding: 0 !important; }

      .p-8, .p-6, .p-5, .p-4, .p-3 { padding: 6px !important; }
      .mb-6, .mb-5, .mb-4, .mb-3 { margin-bottom: 6px !important; }
      .mt-8, .mt-6, .mt-4 { margin-top: 6px !important; }
      .pb-4, .pb-2 { padding-bottom: 4px !important; }
      .pt-4, .pt-2 { padding-top: 4px !important; }
      .gap-4, .gap-6 { gap: 6px !important; }

      .border, .border-t, .border-b, .border-l, .border-r { border-color: #cbd5e1 !important; }
      .rounded-xl, .rounded-2xl { border-radius: 4px !important; }

      h2 { font-size: 13px !important; margin-bottom: 2px !important; font-weight: 800 !important; text-transform: uppercase !important; }
      h4, h5 { font-size: 11px !important; margin-bottom: 2px !important; font-weight: bold !important; }
      span, p, li, strong, td, th { line-height: 1.25 !important; }

      .text-2xl, .text-xl, .text-lg { font-size: 12px !important; font-weight: bold !important; }
      .text-base, .text-sm { font-size: 10px !important; }
      .text-xs { font-size: 9px !important; }
      .text-\[10px\] { font-size: 8px !important; }
      .text-\[9px\] { font-size: 7px !important; }

      li { padding-top: 2px !important; padding-bottom: 2px !important; }
      th, td { padding: 4px !important; }
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Ícones SVG ---
    const Building = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2Z"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2Z"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>;
    const FileText = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
    const Printer = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
    const Settings = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
    const Moon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;
    const Sun = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
    const Tree = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2L3 9h3v10h12V9h3L12 2z"/><path d="M12 22V19"/></svg>;
    const Car = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a2 2 0 0 0-1.6-.8H9.3a2 2 0 0 0-1.6.8L5 11l-5.16.86a1 1 0 0 0-.84.99V16h3m10 0a2 2 0 1 1-4 0m4 0a2 2 0 1 0-4 0m-7 0a2 2 0 1 1-4 0m4 0a2 2 0 1 0-4 0"/></svg>;
    const Home = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;

    // --- Helpers Core ---
    const formatCurrencyStr = (value) => {
        if (value === '' || value === 0 || value == null) return '';
        return Number(value).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    const formatMoney = (val) => {
      if (val === '' || val == null || isNaN(val)) return 'R$ 0,00';
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
    };

    const safeNumber = (val) => {
        if (val === '' || val == null) return 0;
        if (typeof val === 'number') return val;
        const strVal = String(val).replace(',', '.');
        const num = parseFloat(strVal);
        return isNaN(num) ? 0 : num;
    };

    // --- Componentes de Input Otimizados para Celular ---
    const TextInput = ({ label, value, onChange, placeholder }) => (
      <div className="mb-4">
        <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">{label}</label>
        <input type="text" value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} className="block w-full px-4 py-3 sm:py-2.5 text-base sm:text-sm font-medium border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none" />
      </div>
    );

    const DecimalInput = ({ label, value, onChange, placeholder }) => {
      const handleChange = (e) => {
        let val = e.target.value;
        val = val.replace(/[^0-9,]/g, '');
        const parts = val.split(',');
        if (parts.length > 2) val = parts[0] + ',' + parts.slice(1).join('');
        onChange(val);
      };
      return (
        <div className="mb-4">
          <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">{label}</label>
          <input type="text" inputMode="decimal" value={value} onChange={handleChange} placeholder={placeholder} className="block w-full px-4 py-3 sm:py-2.5 text-base sm:text-sm font-semibold border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none" />
        </div>
      );
    };

    const PercentInput = ({ label, value, onChange, placeholder, extraElement, max }) => {
      const handleChange = (e) => {
        let val = e.target.value;
        val = val.replace(/[^0-9,]/g, '');
        const parts = val.split(',');
        if (parts.length > 2) val = parts[0] + ',' + parts.slice(1).join('');
        if (max != null && val !== '' && safeNumber(val) > max) {
          val = String(max).replace('.', ',');
        }
        onChange(val);
      };
      return (
        <div className="mb-4">
          <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">{label}</label>
          <div className="relative rounded-xl shadow-sm">
            <input type="text" inputMode="decimal" value={value} onChange={handleChange} placeholder={placeholder} className="block w-full pl-4 pr-10 py-3 sm:py-2.5 text-base sm:text-sm font-semibold border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none" />
            <div className="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none"><span className="text-slate-500 font-medium sm:text-sm">%</span></div>
          </div>
          {extraElement && <div className="mt-1">{extraElement}</div>}
        </div>
      );
    };

    const MoneyInput = ({ label, value, onChange, placeholder, subText }) => {
      const displayValue = value === '' ? '' : formatCurrencyStr(value);

      const handleChange = (e) => {
        let rawValue = e.target.value;
        if (rawValue === '') {
          onChange('');
          return;
        }
        const digits = rawValue.replace(/\D/g, '');
        if (digits === '') {
          onChange('');
          return;
        }
        const floatValue = parseInt(digits, 10) / 100;
        onChange(floatValue);
      };

      return (
        <div className="mb-4">
          <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5 truncate">{label}</label>
          <div className="relative rounded-xl shadow-sm">
            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span className="text-slate-500 font-medium sm:text-sm">R$</span></div>
            <input type="text" inputMode="numeric" value={displayValue} onChange={handleChange} className="block w-full pl-10 pr-4 py-3 sm:py-2.5 text-base sm:text-sm font-semibold border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none" placeholder={placeholder || "0,00"} />
          </div>
          <div className="text-xs text-slate-500 mt-1 ml-1 font-medium min-h-[16px]">
            {subText ? subText : ''}
          </div>
        </div>
      );
    };

    const TaxInput = ({ label, value, onChangeValue, type, onChangeType, description, disabled }) => {
      let displayValue = value;
      if (type === 'fixed' && value !== '') {
          displayValue = formatCurrencyStr(value);
      }

      const handleChange = (e) => {
        const raw = e.target.value;
        if (type === 'fixed') {
            if (raw === '') {
                onChangeValue('');
                return;
            }
            const digits = raw.replace(/\D/g, '');
            if (digits === '') {
                onChangeValue('');
                return;
            }
            onChangeValue(parseInt(digits, 10) / 100);
        } else {
            let val = raw.replace(/[^0-9,]/g, '');
            const parts = val.split(',');
            if (parts.length > 2) val = parts[0] + ',' + parts.slice(1).join('');
            onChangeValue(val);
        }
      };

      return (
        <div className="mb-4">
          <div className="flex flex-col sm:flex-row justify-between sm:items-end mb-1.5 gap-2 sm:gap-0">
            <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300">{label}</label>
            {!disabled && (
              <div className="flex bg-slate-200 dark:bg-slate-700 rounded-lg p-1 w-fit">
                <button onClick={() => onChangeType('percent')} className={`px-3 py-1 text-xs uppercase font-bold rounded-md transition-colors ${type === 'percent' ? 'bg-white dark:bg-slate-800 text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>%</button>
                <button onClick={() => onChangeType('fixed')} className={`px-3 py-1 text-xs uppercase font-bold rounded-md transition-colors ${type === 'fixed' ? 'bg-white dark:bg-slate-800 text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>R$</button>
              </div>
            )}
          </div>
          <div className="relative rounded-xl shadow-sm">
            {(type === 'fixed' || disabled) && (
              <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span className="text-slate-500 font-medium sm:text-sm">R$</span></div>
            )}
            <input
              type="text" inputMode={type === 'fixed' || disabled ? "numeric" : "decimal"} disabled={disabled}
              value={displayValue}
              onChange={handleChange}
              className={`block w-full ${(type === 'fixed' || disabled) ? 'pl-10 pr-4' : 'pl-4 pr-10'} py-3 sm:py-2.5 text-base sm:text-sm font-medium border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all disabled:opacity-75`}
              placeholder="0"
            />
            {type === 'percent' && !disabled && (
              <div className="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none"><span className="text-slate-500 font-medium sm:text-sm">%</span></div>
            )}
          </div>
          <div className="flex justify-between items-center mt-1.5 ml-1 h-4">
            {description && <div className="text-[11px] text-slate-500">{description}</div>}
          </div>
        </div>
      );
    };

    const Card = ({ title, icon: Icon, children, extraHeader }) => (
      <div className="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm p-4 sm:p-6 relative">
        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-5 gap-3 sm:gap-0">
            <h3 className="text-base font-bold text-slate-800 dark:text-slate-200 flex items-center gap-2">
            {Icon && <Icon className="w-5 h-5 text-indigo-600" />} {title}
            </h3>
            {extraHeader}
        </div>
        {children}
      </div>
    );

    // --- Matemática Paraná (TJ-PR - Lei 6.183/2023 e Lei 21.869/2023, atualizada 2026) ---

    // Tabela III-C (Registro de Imóveis, atos onerosos: compra e venda / arrematação em
    // hasta pública). Valor TOTAL já inclui Emolumento + FUNJECC + FUNADEP/FUNDE-PGE +
    // FEADMP + ISS 5% + Selos. Vigência: 01/01/2026.
    const TABELA_REGISTRO_PR_2026 = [
      { ate: 5000, total: 142.38 }, { ate: 10000, total: 259.09 }, { ate: 15000, total: 374.24 },
      { ate: 20000, total: 490.81 }, { ate: 25000, total: 604.43 }, { ate: 30000, total: 719.44 },
      { ate: 35000, total: 836.17 }, { ate: 40000, total: 951.33 }, { ate: 45000, total: 1068.03 },
      { ate: 50000, total: 1183.07 }, { ate: 55000, total: 1414.93 }, { ate: 60000, total: 1529.96 },
      { ate: 65000, total: 1646.67 }, { ate: 70000, total: 1760.29 }, { ate: 75000, total: 1875.29 },
      { ate: 80000, total: 1990.46 }, { ate: 85000, total: 2107.18 }, { ate: 90000, total: 2222.19 },
      { ate: 95000, total: 2338.83 }, { ate: 100000, total: 2569.08 }, { ate: 110000, total: 2683.01 },
      { ate: 120000, total: 2799.41 }, { ate: 130000, total: 2914.44 }, { ate: 140000, total: 3029.58 },
      { ate: 150000, total: 3144.60 }, { ate: 160000, total: 3240.52 }, { ate: 170000, total: 3336.44 },
      { ate: 180000, total: 3432.36 }, { ate: 190000, total: 3528.30 }, { ate: 200000, total: 3624.22 },
      { ate: 210000, total: 3717.02 }, { ate: 220000, total: 3809.68 }, { ate: 230000, total: 3902.49 },
      { ate: 240000, total: 3995.16 }, { ate: 250000, total: 4087.82 }, { ate: 260000, total: 4257.30 },
      { ate: 270000, total: 4426.79 }, { ate: 280000, total: 4596.29 }, { ate: 290000, total: 4765.76 },
      { ate: 300000, total: 4935.11 }, { ate: 325000, total: 5016.74 }, { ate: 350000, total: 5098.24 },
      { ate: 375000, total: 5179.71 }, { ate: 400000, total: 5261.35 }, { ate: 425000, total: 5342.88 },
      { ate: 450000, total: 5424.33 }, { ate: 475000, total: 5505.97 }, { ate: 500000, total: 5587.46 },
      { ate: 600000, total: 5668.94 }, { ate: 700000, total: 5750.44 }, { ate: 800000, total: 5832.06 },
      { ate: 900000, total: 5913.55 }, { ate: 1000000, total: 5995.05 }, { ate: 2000000, total: 6408.71 },
      { ate: 3000000, total: 6903.88 }, { ate: 4000000, total: 7399.05 }, { ate: 5000000, total: 7894.20 },
      { ate: 7000000, total: 8389.37 }, { ate: 9000000, total: 8884.52 }, { ate: Infinity, total: 9379.69 }
    ];

    // Tabela XI, item IV (Tabelionato de Notas - Escrituras). Base do emolumento (sem
    // FADEP/ISS/selo). Tabela oficial "não é progressiva" e não define faixas acima de
    // R$226.000,00 — para valores acima disso o app sinaliza que é extrapolação.
    const TABELA_ESCRITURA_PR_2026 = [
      { ate: 56000, base: 349.02 }, { ate: 66000, base: 411.34 }, { ate: 76000, base: 473.67 },
      { ate: 86000, base: 535.99 }, { ate: 96000, base: 598.32 }, { ate: 106000, base: 660.64 },
      { ate: 116000, base: 722.97 }, { ate: 126000, base: 785.29 }, { ate: 136000, base: 847.62 },
      { ate: 146000, base: 909.94 }, { ate: 156000, base: 972.27 }, { ate: 166000, base: 1011.60 },
      { ate: 176000, base: 1072.54 }, { ate: 186000, base: 1133.48 }, { ate: 196000, base: 1194.42 },
      { ate: 206000, base: 1255.36 }, { ate: 216000, base: 1316.30 }, { ate: 226000, base: 1377.24 }
    ];
    const TETO_TABELA_ESCRITURA_PR = 226000;

    const VIGENCIA_TABELAS_PR = '01/01/2026';

    const buscarFaixa = (tabela, valor, campo) => {
      const faixa = tabela.find(f => valor <= f.ate);
      return faixa ? faixa[campo] : tabela[tabela.length - 1][campo];
    };

    const calcularRegistroPR = (valor) => {
      if (!valor) return 0;
      return buscarFaixa(TABELA_REGISTRO_PR_2026, valor, 'total');
    };

    const calcularEscrituraPR = (valor) => {
      if (!valor) return { total: 0, extrapolado: false };
      const base = buscarFaixa(TABELA_ESCRITURA_PR_2026, valor, 'base');
      const fadep = base * 0.05;
      const selo = 8.00;
      const iss = base * 0.03;
      return { total: base + fadep + selo + iss, extrapolado: valor > TETO_TABELA_ESCRITURA_PR };
    };

    const calcularFunrejus = (valor) => {
      if (!valor) return 0;
      const teto = 7408.87;
      const calc = valor * 0.002;
      return calc > teto ? teto : calc;
    };

    // Constantes de Alqueire
    const ALQUEIRES = {
      alq_paulista: { m2: 24200, ha: 2.42, name: "Alqueire Paulista (2.42 ha)" },
      alq_mineiro: { m2: 48400, ha: 4.84, name: "Alqueire Mineiro/Goiano (4.84 ha)" },
      alq_baiano: { m2: 96800, ha: 9.68, name: "Alqueire Baiano (9.68 ha)" },
      alqueirao: { m2: 193600, ha: 19.36, name: "Alqueirão (19.36 ha)" },
      alq_norte: { m2: 27255, ha: 2.7255, name: "Alqueire do Norte (2.72 ha)" }
    };

    // --- App Principal ---
    function App() {
      // Carregamento de Configurações da Memória Local
      const loadInitialState = () => {
          try {
            const savedData = localStorage.getItem('central_calc_imob_v14');
            if (savedData) {
                return JSON.parse(savedData);
            }
          } catch (e) {
            console.warn('Não foi possível carregar os dados salvos (localStorage corrompido).', e);
          }
          return null;
      };

      const initialState = loadInitialState();

      // Configurações Globais
      const [advName, setAdvName] = useState(initialState?.advName || "Thiago Reis - Assessoria Jurídica");
      const [advOab, setAdvOab] = useState(initialState?.advOab || "OAB/PR 115.608");
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [isCasesOpen, setIsCasesOpen] = useState(false);
      const [darkMode, setDarkMode] = useState(initialState?.darkMode || false);
      const [activeTab, setActiveTab] = useState(initialState?.activeTab || 'leilao');

      // Estados: LEILÃO
      const [assetType, setAssetType] = useState(initialState?.assetType || 'urbano');
      const [veiculoMode, setVeiculoMode] = useState(initialState?.veiculoMode || 'leilao');
      const [clienteNomeLeilao, setClienteNomeLeilao] = useState(initialState?.clienteNomeLeilao || '');
      const [imovelDescLeilao, setImovelDescLeilao] = useState(initialState?.imovelDescLeilao || '');

      const [valMode, setValMode] = useState(initialState?.valMode || 'total');

      const [evalValue, setEvalValue] = useState(initialState?.evalValue || '');
      const [marketValue, setMarketValue] = useState(initialState?.marketValue || '');
      const [bidValue, setBidValue] = useState(initialState?.bidValue || '');

      const [evalUnitValue, setEvalUnitValue] = useState(initialState?.evalUnitValue || '');
      const [marketUnitValue, setMarketUnitValue] = useState(initialState?.marketUnitValue || '');
      const [bidUnitValue, setBidUnitValue] = useState(initialState?.bidUnitValue || '');

      const [maxBudget, setMaxBudget] = useState(initialState?.maxBudget || '');

      const [assetSize, setAssetSize] = useState(initialState?.assetSize || '');
      const [ruralUnit, setRuralUnit] = useState(initialState?.ruralUnit || 'ha');

      const [fipeDiscount, setFipeDiscount] = useState(initialState?.fipeDiscount || '30');

      const [leiloeiro, setLeiloeiro] = useState(initialState?.leiloeiro || { value: '5', type: 'percent' });
      const [itbi, setItbi] = useState(initialState?.itbi || { value: '2', type: 'percent' });
      const [valorVenalLeilao, setValorVenalLeilao] = useState(initialState?.valorVenalLeilao || '');
      const [legal, setLegal] = useState(initialState?.legal || { value: '5', type: 'percent' });
      const [cartorioModeLeilao, setCartorioModeLeilao] = useState(initialState?.cartorioModeLeilao || 'pr');
      const [cartorioManualLeilao, setCartorioManualLeilao] = useState(initialState?.cartorioManualLeilao || { value: '2', type: 'percent' });
      const [debts, setDebts] = useState(initialState?.debts || '');
      const [renovation, setRenovation] = useState(initialState?.renovation || '');

      // Estados: ESCRITURA
      const [clienteNome, setClienteNome] = useState(initialState?.clienteNome || '');
      const [imovelDesc, setImovelDesc] = useState(initialState?.imovelDesc || '');
      const [negocioValor, setNegocioValor] = useState(initialState?.negocioValor || '');
      const [valorVenalEsc, setValorVenalEsc] = useState(initialState?.valorVenalEsc || '');
      const [incluirRgi, setIncluirRgi] = useState(initialState?.incluirRgi ?? true);
      const [escrituraMode, setEscrituraMode] = useState(initialState?.escrituraMode || 'pr');
      const [itbiEscritura, setItbiEscritura] = useState(initialState?.itbiEscritura || { value: '2', type: 'percent' });
      const [escrituraManual, setEscrituraManual] = useState(initialState?.escrituraManual || { value: '', type: 'fixed' });
      const [rgiManual, setRgiManual] = useState(initialState?.rgiManual || { value: '', type: 'fixed' });
      const [certidoesEsc, setCertidoesEsc] = useState(initialState?.certidoesEsc || '');
      const [diligenciasEsc, setDiligenciasEsc] = useState(initialState?.diligenciasEsc || '');

      // Casos salvos (histórico multi-cliente)
      const [savedCases, setSavedCases] = useState(() => {
        try {
          const raw = localStorage.getItem('central_calc_imob_casos_v1');
          return raw ? JSON.parse(raw) : [];
        } catch (e) { return []; }
      });

      // Salvar Memória
      useEffect(() => {
          const stateToSave = {
              advName, advOab, darkMode, activeTab, assetType, veiculoMode, clienteNomeLeilao, imovelDescLeilao,
              valMode, evalValue, marketValue, bidValue, evalUnitValue, marketUnitValue, bidUnitValue, maxBudget,
              assetSize, ruralUnit, fipeDiscount, leiloeiro, itbi, valorVenalLeilao, legal, cartorioModeLeilao, cartorioManualLeilao, debts, renovation,
              clienteNome, imovelDesc, negocioValor, valorVenalEsc, incluirRgi, escrituraMode, itbiEscritura, escrituraManual, rgiManual, certidoesEsc, diligenciasEsc
          };
          try { localStorage.setItem('central_calc_imob_v14', JSON.stringify(stateToSave)); } catch (e) {}
      }, [advName, advOab, darkMode, activeTab, assetType, veiculoMode, clienteNomeLeilao, imovelDescLeilao, valMode, evalValue, marketValue, bidValue, evalUnitValue, marketUnitValue, bidUnitValue, maxBudget, assetSize, ruralUnit, fipeDiscount, leiloeiro, itbi, valorVenalLeilao, legal, cartorioModeLeilao, cartorioManualLeilao, debts, renovation, clienteNome, imovelDesc, negocioValor, valorVenalEsc, incluirRgi, escrituraMode, itbiEscritura, escrituraManual, rgiManual, certidoesEsc, diligenciasEsc]);

      // Efeito Tema
      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      // Segurança no Modo de Valores
      useEffect(() => {
         if (assetType === 'veiculo' || safeNumber(assetSize) <= 0) {
             if (valMode === 'unit') handleValModeChange('total');
         }
      }, [assetType, assetSize]);

      const persistCases = (list) => {
        setSavedCases(list);
        try { localStorage.setItem('central_calc_imob_casos_v1', JSON.stringify(list)); } catch (e) {}
      };

      const buildCurrentState = () => ({
        advName, advOab, darkMode, activeTab, assetType, veiculoMode, clienteNomeLeilao, imovelDescLeilao,
        valMode, evalValue, marketValue, bidValue, evalUnitValue, marketUnitValue, bidUnitValue, maxBudget,
        assetSize, ruralUnit, fipeDiscount, leiloeiro, itbi, valorVenalLeilao, legal, cartorioModeLeilao, cartorioManualLeilao, debts, renovation,
        clienteNome, imovelDesc, negocioValor, valorVenalEsc, incluirRgi, escrituraMode, itbiEscritura, escrituraManual, rgiManual, certidoesEsc, diligenciasEsc
      });

      const applyState = (s) => {
        setAdvName(s.advName ?? advName); setAdvOab(s.advOab ?? advOab);
        setActiveTab(s.activeTab || 'leilao');
        setAssetType(s.assetType || 'urbano'); setVeiculoMode(s.veiculoMode || 'leilao');
        setClienteNomeLeilao(s.clienteNomeLeilao || ''); setImovelDescLeilao(s.imovelDescLeilao || '');
        setValMode(s.valMode || 'total');
        setEvalValue(s.evalValue ?? ''); setMarketValue(s.marketValue ?? ''); setBidValue(s.bidValue ?? '');
        setEvalUnitValue(s.evalUnitValue ?? ''); setMarketUnitValue(s.marketUnitValue ?? ''); setBidUnitValue(s.bidUnitValue ?? '');
        setMaxBudget(s.maxBudget ?? '');
        setAssetSize(s.assetSize ?? ''); setRuralUnit(s.ruralUnit || 'ha');
        setFipeDiscount(s.fipeDiscount ?? '30');
        setLeiloeiro(s.leiloeiro || { value: '5', type: 'percent' });
        setItbi(s.itbi || { value: '2', type: 'percent' });
        setValorVenalLeilao(s.valorVenalLeilao ?? '');
        setLegal(s.legal || { value: '5', type: 'percent' });
        setCartorioModeLeilao(s.cartorioModeLeilao || 'pr');
        setCartorioManualLeilao(s.cartorioManualLeilao || { value: '2', type: 'percent' });
        setDebts(s.debts ?? ''); setRenovation(s.renovation ?? '');
        setClienteNome(s.clienteNome || ''); setImovelDesc(s.imovelDesc || '');
        setNegocioValor(s.negocioValor ?? ''); setValorVenalEsc(s.valorVenalEsc ?? '');
        setIncluirRgi(s.incluirRgi ?? true);
        setEscrituraMode(s.escrituraMode || 'pr');
        setItbiEscritura(s.itbiEscritura || { value: '2', type: 'percent' });
        setEscrituraManual(s.escrituraManual || { value: '', type: 'fixed' });
        setRgiManual(s.rgiManual || { value: '', type: 'fixed' });
        setCertidoesEsc(s.certidoesEsc ?? ''); setDiligenciasEsc(s.diligenciasEsc ?? '');
      };

      const handleSaveCase = () => {
        const nomeSugerido = (activeTab === 'leilao' ? clienteNomeLeilao : clienteNome) || 'Caso sem nome';
        const nome = window.prompt('Nome para identificar este caso:', nomeSugerido);
        if (!nome) return;
        const novoCaso = {
          id: Date.now().toString(36),
          nome,
          tipo: activeTab,
          data: new Date().toLocaleDateString('pt-BR'),
          state: buildCurrentState()
        };
        persistCases([novoCaso, ...savedCases]);
      };

      const handleLoadCase = (id) => {
        const found = savedCases.find(c => c.id === id);
        if (found) { applyState(found.state); setIsCasesOpen(false); }
      };

      const handleDeleteCase = (id) => {
        if (window.confirm('Excluir este caso salvo?')) {
          persistCases(savedCases.filter(c => c.id !== id));
        }
      };

      const handlePrint = () => {
        const wasDark = darkMode;
        if(wasDark) setDarkMode(false);
        setTimeout(() => {
          window.print();
          if(wasDark) setDarkMode(true);
        }, 100);
      };

      const handleReset = () => {
        if(window.confirm("Zerar valores desta aba?")) {
            if(activeTab === 'leilao') {
                setClienteNomeLeilao(''); setImovelDescLeilao('');
                setEvalValue(''); setMarketValue(''); setBidValue('');
                setEvalUnitValue(''); setMarketUnitValue(''); setBidUnitValue('');
                setMaxBudget(''); setDebts(''); setRenovation(''); setValorVenalLeilao('');
                setAssetSize(''); setAssetType('urbano'); setVeiculoMode('leilao'); setRuralUnit('ha'); setValMode('total'); setFipeDiscount('30');
            } else {
                setClienteNome(''); setImovelDesc(''); setNegocioValor(''); setValorVenalEsc('');
                setItbiEscritura({ value: '2', type: 'percent' });
                setEscrituraManual({ value: '', type: 'fixed' });
                setRgiManual({ value: '', type: 'fixed' });
                setCertidoesEsc(''); setDiligenciasEsc('');
                setEscrituraMode('pr');
            }
        }
      };

      const getUnitLabel = () => {
        if (assetType === 'urbano') return 'm²';
        if (assetType === 'rural') {
           if (ruralUnit === 'm2') return 'm²';
           if (ruralUnit === 'ha') return 'Hectare';
           if (ALQUEIRES[ruralUnit]) return ALQUEIRES[ruralUnit].name.split(' (')[0];
        }
        return '';
      };

      const handleValModeChange = (newMode) => {
        const size = safeNumber(assetSize);
        if (size <= 0 && newMode === 'unit') return;

        if (newMode === 'unit' && valMode === 'total') {
            setBidUnitValue(safeNumber(bidValue) / size || '');
            setEvalUnitValue(safeNumber(evalValue) / size || '');
            setMarketUnitValue(safeNumber(marketValue) / size || '');
        } else if (newMode === 'total' && valMode === 'unit') {
            setBidValue(safeNumber(bidUnitValue) * size || '');
            setEvalValue(safeNumber(evalUnitValue) * size || '');
            setMarketValue(safeNumber(marketUnitValue) * size || '');
        }
        setValMode(newMode);
      };

      const getSubText = (isTotal, value, size) => {
        if (size <= 0 || value === '' || value === null) return '';
        const num = safeNumber(value);
        if (isNaN(num) || num === 0) return '';
        if (isTotal) {
          return `Equivale a ${formatMoney(num / size)} / ${getUnitLabel()}`;
        } else {
          return `Total: ${formatMoney(num * size)}`;
        }
      };

      const safeSize = safeNumber(assetSize);

      // --- Matemática: LEILÃO ---
      const calcTax = (taxState, baseValue) => {
        const val = safeNumber(taxState.value);
        if (taxState.type === 'percent') return baseValue * (val / 100);
        return val;
      };

      const safeBid = valMode === 'total' ? safeNumber(bidValue) : safeNumber(bidUnitValue) * safeSize;
      const safeEval = valMode === 'total' ? safeNumber(evalValue) : safeNumber(evalUnitValue) * safeSize;
      const safeMarket = valMode === 'total' ? safeNumber(marketValue) : safeNumber(marketUnitValue) * safeSize;

      const fipeDiscountClamped = Math.min(100, Math.max(0, safeNumber(fipeDiscount)));
      const discountedSaleValue = assetType === 'veiculo' ? safeMarket * (1 - fipeDiscountClamped / 100) : safeMarket;

      const isRegularizacao = assetType === 'veiculo' && veiculoMode === 'regularizacao';

      const leiloeiroCost = isRegularizacao ? 0 : calcTax(leiloeiro, safeBid);
      const baseItbiLeilao = Math.max(safeBid, safeNumber(valorVenalLeilao));
      const itbiCostLeilao = assetType === 'veiculo' ? 0 : calcTax(itbi, baseItbiLeilao);
      const legalCost = calcTax(legal, safeBid);

      let cartorioCostLeilao = 0;
      if (assetType !== 'veiculo') {
        if (cartorioModeLeilao === 'pr') cartorioCostLeilao = calcularRegistroPR(safeBid);
        else cartorioCostLeilao = calcTax(cartorioManualLeilao, safeBid);
      }

      const fixedCostsLeilao = safeNumber(debts) + safeNumber(renovation);
      const finalLeilao = safeBid + leiloeiroCost + itbiCostLeilao + legalCost + cartorioCostLeilao + fixedCostsLeilao;

      const lucroAbsoluto = discountedSaleValue > 0 ? discountedSaleValue - finalLeilao : 0;
      const margemLucroPorcentagem = discountedSaleValue > 0 && finalLeilao > 0 ? (lucroAbsoluto / finalLeilao) * 100 : 0;

      const arremateFipePercent = safeMarket > 0 && safeBid > 0 ? (safeBid / safeMarket) * 100 : 0;

      let maxBidForProfit = 0;
      if (assetType === 'veiculo' && discountedSaleValue > 0) {
          let low = 0, high = discountedSaleValue, best = 0;
          for(let i=0; i<50; i++) {
              let mid = (low + high) / 2;
              let lCost = isRegularizacao ? 0 : (leiloeiro.type === 'percent' ? mid * (safeNumber(leiloeiro.value)/100) : safeNumber(leiloeiro.value));
              let legCost = legal.type === 'percent' ? mid * (safeNumber(legal.value)/100) : safeNumber(legal.value);
              let total = mid + lCost + legCost + fixedCostsLeilao;
              if (total > discountedSaleValue) high = mid;
              else { best = mid; low = mid; }
          }
          maxBidForProfit = Math.floor(best);
      } else if (assetType !== 'veiculo' && safeMarket > 0) {
          let low = 0, high = safeMarket, best = 0;
          for(let i=0; i<50; i++) {
              let mid = (low + high) / 2;
              let lCost = leiloeiro.type === 'percent' ? mid * (safeNumber(leiloeiro.value)/100) : safeNumber(leiloeiro.value);
              let iCost = itbi.type === 'percent' ? Math.max(mid, safeNumber(valorVenalLeilao)) * (safeNumber(itbi.value)/100) : safeNumber(itbi.value);
              let legCost = legal.type === 'percent' ? mid * (safeNumber(legal.value)/100) : safeNumber(legal.value);
              let cCost = cartorioModeLeilao === 'pr' ? calcularRegistroPR(mid) : (cartorioManualLeilao.type === 'percent' ? mid * (safeNumber(cartorioManualLeilao.value)/100) : safeNumber(cartorioManualLeilao.value));
              let total = mid + lCost + iCost + legCost + cCost + fixedCostsLeilao;
              if (total > safeMarket) high = mid;
              else { best = mid; low = mid; }
          }
          maxBidForProfit = Math.floor(best);
      }

      const handleSuggestBid = () => {
        const budget = safeNumber(maxBudget);
        let low = 0, high = budget, bestBid = 0;

        for (let i = 0; i < 50; i++) {
          let mid = (low + high) / 2;
          let lCost = isRegularizacao ? 0 : (leiloeiro.type === 'percent' ? mid * (safeNumber(leiloeiro.value)/100) : safeNumber(leiloeiro.value));
          let iCost = assetType === 'veiculo' ? 0 : (itbi.type === 'percent' ? Math.max(mid, safeNumber(valorVenalLeilao)) * (safeNumber(itbi.value)/100) : safeNumber(itbi.value));
          let legCost = legal.type === 'percent' ? mid * (safeNumber(legal.value)/100) : safeNumber(legal.value);

          let cCost = 0;
          if (assetType !== 'veiculo') {
            if(cartorioModeLeilao === 'pr') cCost = calcularRegistroPR(mid);
            else cCost = cartorioManualLeilao.type === 'percent' ? mid * (safeNumber(cartorioManualLeilao.value)/100) : safeNumber(cartorioManualLeilao.value);
          }

          let total = mid + lCost + iCost + legCost + cCost + fixedCostsLeilao;
          if (total > budget) high = mid;
          else { bestBid = mid; low = mid; }
        }

        const finalBest = Math.floor(bestBid);
        if (valMode === 'total') {
            setBidValue(finalBest);
        } else {
            setBidUnitValue(finalBest / safeSize);
        }
      };

      // Conversão Rural & Urbano
      let areaInM2 = 0, areaInHa = 0, areaInAlq = 0;
      let alqName = "Alqueire";

      if (assetType === 'urbano') {
          areaInM2 = safeSize;
      } else if (assetType === 'rural' && safeSize > 0) {
        if (ruralUnit === 'm2') {
            areaInM2 = safeSize;
            areaInHa = safeSize / 10000;
            areaInAlq = safeSize / ALQUEIRES.alq_paulista.m2;
            alqName = "Alq. Paulista";
        }
        else if (ruralUnit === 'ha') {
            areaInM2 = safeSize * 10000;
            areaInHa = safeSize;
            areaInAlq = safeSize / ALQUEIRES.alq_paulista.ha;
            alqName = "Alq. Paulista";
        }
        else if (ALQUEIRES[ruralUnit]) {
            const config = ALQUEIRES[ruralUnit];
            areaInM2 = safeSize * config.m2;
            areaInHa = safeSize * config.ha;
            areaInAlq = safeSize;
            alqName = config.name.split(" (")[0];
        }
      }

      const getUnitRates = (totalValue) => {
        if (assetType === 'veiculo' || safeSize <= 0 || !totalValue) return { m2: 0, ha: 0, alq: 0 };
        return {
          m2: totalValue / areaInM2,
          ha: assetType === 'rural' ? totalValue / areaInHa : 0,
          alq: assetType === 'rural' ? totalValue / areaInAlq : 0
        };
      };

      const ratesEval = getUnitRates(safeEval);
      const ratesMarket = getUnitRates(safeMarket);
      const ratesBid = getUnitRates(safeBid);

      // --- Matemática: ESCRITURA ---
      const safeNegocio = safeNumber(negocioValor);
      const baseItbiEsc = Math.max(safeNegocio, safeNumber(valorVenalEsc));
      const itbiCostEsc = calcTax(itbiEscritura, baseItbiEsc);
      const funrejusCost = calcularFunrejus(safeNegocio);

      let lavraturaCost = 0, cartorioCostEsc = 0, escrituraExtrapolada = false;
      if (escrituraMode === 'pr') {
          const resultadoEscritura = calcularEscrituraPR(safeNegocio);
          lavraturaCost = resultadoEscritura.total;
          escrituraExtrapolada = resultadoEscritura.extrapolado;
          cartorioCostEsc = calcularRegistroPR(safeNegocio);
      } else {
          lavraturaCost = calcTax(escrituraManual, safeNegocio);
          cartorioCostEsc = calcTax(rgiManual, safeNegocio);
      }

      const safeCertidoesEsc = safeNumber(certidoesEsc);
      const safeDiligenciasEsc = safeNumber(diligenciasEsc);

      const custoInicialEsc = itbiCostEsc + lavraturaCost + funrejusCost + safeCertidoesEsc + safeDiligenciasEsc;
      const totalEscrituraComRegistro = custoInicialEsc + cartorioCostEsc;

      // --- Compartilhamento ---
      const buildResumoTexto = () => {
        if (activeTab === 'leilao') {
          const linhas = [
            `*${assetType === 'veiculo' ? (isRegularizacao ? 'Análise de Compra com Regularização' : 'Análise Veicular') : 'Análise Imobiliária'}*`,
            advName + (advOab ? ` — ${advOab}` : ''),
            clienteNomeLeilao ? `Cliente: ${clienteNomeLeilao}` : null,
            imovelDescLeilao ? `Bem: ${imovelDescLeilao}` : null,
            '',
            `Lance/Compra: ${formatMoney(safeBid)}`,
            `Custo Operacional Total: ${formatMoney(finalLeilao)}`,
            discountedSaleValue > 0 ? `Lucro Estimado: ${formatMoney(lucroAbsoluto)} (${margemLucroPorcentagem > 0 ? '+' : ''}${formatCurrencyStr(margemLucroPorcentagem)}%)` : null,
          ].filter(Boolean);
          return linhas.join('\n');
        }
        const linhas = [
          '*Memorial de Custas de Escrituração*',
          advName + (advOab ? ` — ${advOab}` : ''),
          clienteNome ? `Cliente: ${clienteNome}` : null,
          imovelDesc ? `Imóvel: ${imovelDesc}` : null,
          '',
          `Valor do Negócio: ${formatMoney(safeNegocio)}`,
          `Total sem Registro: ${formatMoney(custoInicialEsc)}`,
          `Total com Registro (RGI): ${formatMoney(totalEscrituraComRegistro)}`,
        ].filter(Boolean);
        return linhas.join('\n');
      };

      const handleCopyResumo = async () => {
        const texto = buildResumoTexto();
        try {
          await navigator.clipboard.writeText(texto);
          alert('Resumo copiado para a área de transferência.');
        } catch (e) {
          window.prompt('Copie o resumo abaixo:', texto);
        }
      };

      const handleShareWhatsapp = () => {
        const texto = encodeURIComponent(buildResumoTexto());
        window.open(`https://wa.me/?text=${texto}`, '_blank');
      };

      return (
        <div className="min-h-screen pb-24 print-page-wrapper">

          {/* Menu Superior e Configurações */}
          <div className="bg-slate-900 text-white print-hide pt-6 sm:pt-8 pb-10 sm:pb-12 px-3 sm:px-4">
            <div className="max-w-5xl mx-auto">
              <div className="flex flex-col sm:flex-row justify-between items-center sm:items-start mb-6 gap-4 sm:gap-0">
                <div className="text-center sm:text-left">
                  <h1 className="text-xl sm:text-3xl font-extrabold tracking-tight">{advName}</h1>
                  <p className="text-slate-400 font-medium text-xs sm:text-sm mt-1">{advOab}</p>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setIsCasesOpen(!isCasesOpen)} className="px-3 py-3 sm:py-2 bg-slate-800 hover:bg-slate-700 rounded-xl sm:rounded-lg text-slate-300 shadow-sm text-xs font-bold uppercase tracking-wide">
                    Casos
                  </button>
                  <button onClick={() => setDarkMode(!darkMode)} className="p-3 sm:p-2 bg-slate-800 hover:bg-slate-700 rounded-xl sm:rounded-lg text-slate-300 shadow-sm">
                    {darkMode ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
                  </button>
                  <button onClick={() => setIsSettingsOpen(!isSettingsOpen)} className="p-3 sm:p-2 bg-slate-800 hover:bg-slate-700 rounded-xl sm:rounded-lg text-slate-300 shadow-sm">
                    <Settings className="w-5 h-5" />
                  </button>
                </div>
              </div>

              {isSettingsOpen && (
                <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 mb-6">
                  <h3 className="text-sm font-bold mb-3 text-slate-200">Configurações de Identidade</h3>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <TextInput label="Nome do Profissional/Escritório" value={advName} onChange={setAdvName} />
                    <TextInput label="Registo Profissional (Ex: OAB/PR)" value={advOab} onChange={setAdvOab} />
                  </div>
                  <p className="text-[11px] text-slate-400 mt-2">Tabelas de custas TJ-PR vigentes desde {VIGENCIA_TABELAS_PR}. Verifique atualizações anuais antes de confiar em valores altos.</p>
                </div>
              )}

              {isCasesOpen && (
                <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 mb-6">
                  <div className="flex justify-between items-center mb-3">
                    <h3 className="text-sm font-bold text-slate-200">Casos Salvos</h3>
                    <button onClick={handleSaveCase} className="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-lg">Salvar Caso Atual</button>

                      {!isRegularizacao && (
                        <li className="flex justify-between text-slate-600 dark:text-slate-400">
                          <span>Comissão do Leiloeiro</span>
                          <span className="text-rose-500 font-medium">+{formatMoney(leiloeiroCost)}</span>
                        </li>
                      )}

                      {assetType !== 'veiculo' && (
                        <>
                          <li className="flex justify-between text-slate-600 dark:text-slate-400">
                            <span>ITBI Arrematação{safeNumber(valorVenalLeilao) > safeBid ? ' (s/ valor venal)' : ''}</span>
                            <span className="text-rose-500 font-medium">+{formatMoney(itbiCostLeilao)}</span>
                          </li>
                          <li className="flex justify-between text-slate-600 dark:text-slate-400">
                            <span>Cartório de Registo</span>
                            <span className="text-rose-500 font-medium">+{formatMoney(cartorioCostLeilao)}</span>
                          </li>
                        </>
                      )}

                      <li className="flex justify-between text-slate-600 dark:text-slate-400">
                        <span>{isRegularizacao ? "Honorários Judiciais e Custas" : "Assessoria Jurídica"}</span>
                        <span className="text-rose-500 font-medium">+{formatMoney(legalCost)}</span>
                      </li>
                      {(safeNumber(debts) > 0 || safeNumber(renovation) > 0) && (
                        <li className="flex justify-between text-slate-600 dark:text-slate-400 pt-2 border-t border-slate-100 dark:border-slate-800">
                          <span>{isRegularizacao ? "Multas, Doc. e Reparos" : "Passivos & Custos Extras"}</span>
                          <span className="text-amber-500 font-medium">+{formatMoney(fixedCostsLeilao)}</span>
                        </li>
                      )}
                      <li className="flex justify-between font-extrabold text-lg pt-4 mt-2 border-t border-slate-200 dark:border-slate-800">
                        <span>Custo Operacional Total</span>
                        <span className="text-indigo-700 dark:text-indigo-400">{formatMoney(finalLeilao)}</span>
                      </li>
                    </ul>

                    {/* Comparativo de Preço por Unidade (Imóveis) */}
                    {assetType !== 'veiculo' && safeSize > 0 && (
                      <div className="mt-8">
                        <h4 className="font-bold text-slate-800 dark:text-slate-100 mb-3 text-xs uppercase tracking-wider text-slate-500">Comparação de Custos por Área</h4>
                        <div className="overflow-x-auto no-scrollbar pb-2">
                          <table className="w-full text-left text-xs border-collapse min-w-[400px]">
                            <thead>
                              <tr className="border-b border-slate-200 dark:border-slate-800 text-slate-400">
                                <th className="py-2 font-bold uppercase">Métrica</th>
                                <th className="py-2 text-right font-bold uppercase">Por m²</th>
                                {assetType === 'rural' && <th className="py-2 text-right font-bold uppercase">Por Hectare</th>}
                                {assetType === 'rural' && <th className="py-2 text-right font-bold uppercase">Por {alqName}</th>}
                              </tr>
                            </thead>
                            <tbody>
                              {safeEval > 0 && (
                                <tr className="border-b border-slate-100 dark:border-slate-800/50">
                                  <td className="py-3 font-semibold text-slate-600 dark:text-slate-400">Avaliação ({formatMoney(safeEval)})</td>
                                  <td className="py-3 text-right font-bold">{formatMoney(ratesEval.m2)}</td>
                                  {assetType === 'rural' && <td className="py-3 text-right font-bold">{formatMoney(ratesEval.ha)}</td>}
                                  {assetType === 'rural' && <td className="py-3 text-right font-bold">{formatMoney(ratesEval.alq)}</td>}
                                </tr>
                              )}
                              {safeMarket > 0 && (
                                <tr className="border-b border-slate-100 dark:border-slate-800/50">
                                  <td className="py-3 font-semibold text-indigo-600 dark:text-indigo-400">Mercado Real ({formatMoney(safeMarket)})</td>
                                  <td className="py-3 text-right font-extrabold text-indigo-600 dark:text-indigo-400">{formatMoney(ratesMarket.m2)}</td>
                                  {assetType === 'rural' && <td className="py-3 text-right font-extrabold text-indigo-600 dark:text-indigo-400">{formatMoney(ratesMarket.ha)}</td>}
                                  {assetType === 'rural' && <td className="py-3 text-right font-extrabold text-indigo-600 dark:text-indigo-400">{formatMoney(ratesMarket.alq)}</td>}
                                </tr>
                              )}
                              <tr className="border-b border-slate-200 dark:border-slate-800">
                                  <td className="py-3 font-semibold text-emerald-600 dark:text-emerald-400">Arrematação ({formatMoney(safeBid)})</td>
                                  <td className="py-3 text-right font-extrabold text-emerald-600 dark:text-emerald-400">{formatMoney(ratesBid.m2)}</td>
                                  {assetType === 'rural' && <td className="py-3 text-right font-extrabold text-emerald-600 dark:text-emerald-400">{formatMoney(ratesBid.ha)}</td>}
                                  {assetType === 'rural' && <td className="py-3 text-right font-extrabold text-emerald-600 dark:text-emerald-400">{formatMoney(ratesBid.alq)}</td>}
                                </tr>
                            </tbody>
                          </table>
                        </div>
                      </div>
                    )}

                    <div className="mt-8 text-[9px] text-slate-400 text-justify leading-relaxed">
                      <strong>Nota Legal:</strong> Documento de caráter puramente estimativo e consultivo visando planejamento financeiro. {assetType !== 'veiculo' ? `Custas notariais calculadas pela Tabela III-C do TJ-PR, vigente desde ${VIGENCIA_TABELAS_PR}, sujeita a atualização anual.` : 'Tabela FIPE e débitos são informativos e sujeitos a variação de mercado.'}
                    </div>

                    <div className="flex flex-col sm:flex-row gap-3 mt-8 print-hide">
                      <button onClick={handleReset} className="w-full sm:w-auto px-6 py-4 sm:py-3 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold rounded-xl transition-all">Limpar</button>
                      <button onClick={handleCopyResumo} className="w-full sm:w-auto px-6 py-4 sm:py-3 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold rounded-xl transition-all">Copiar Resumo</button>
                      <button onClick={handleShareWhatsapp} className="w-full sm:w-auto px-6 py-4 sm:py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition-all">WhatsApp</button>
                      <button onClick={handlePrint} className="w-full flex-1 flex items-center justify-center gap-2 py-4 sm:py-3 bg-slate-900 text-white font-bold rounded-xl transition-all shadow-lg">
                        <Printer className="w-5 h-5" /> Gerar Relatório PDF
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* --- ABA ESCRITURA E COMPRA --- */}
            {activeTab === 'escritura' && (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6">
                <div className="space-y-4 sm:space-y-6 print-hide">
                  <Card title="Dados da Escritura" icon={Building}>
                    <TextInput label="Nome do Adquirente" value={clienteNome} onChange={setClienteNome} placeholder="Ex: João Silva" />
                    <TextInput label="Descrição Detalhada do Imóvel" value={imovelDesc} onChange={setImovelDesc} placeholder="Ex: Chácara São Pedro - Loanda/PR" />
                    <MoneyInput label="Valor Real da Negociação" value={negocioValor} onChange={setNegocioValor} />
                    <MoneyInput label="Valor Venal (opcional, para base do ITBI)" value={valorVenalEsc} onChange={setValorVenalEsc} subText="Se maior que o valor do negócio, o ITBI usa este valor como base" />
                  </Card>

                  <Card
                    title="Configurações de Custas"
                    icon={FileText}
                    extraHeader={
                      <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-lg border border-slate-200/50 dark:border-slate-700">
                        <button onClick={() => setEscrituraMode('pr')} className={`px-3 py-1.5 text-xs font-bold rounded-md transition-all ${escrituraMode === 'pr' ? 'bg-indigo-600 text-white shadow' : 'text-slate-500 hover:text-slate-800 dark:hover:text-slate-300'}`}>Auto PR</button>
                        <button onClick={() => setEscrituraMode('manual')} className={`px-3 py-1.5 text-xs font-bold rounded-md transition-all ${escrituraMode === 'manual' ? 'bg-indigo-600 text-white shadow' : 'text-slate-500 hover:text-slate-800 dark:hover:text-slate-300'}`}>Manual</button>
                      </div>
                    }
                  >
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <TaxInput label="ITBI (%)" value={itbiEscritura.value} type={itbiEscritura.type} onChangeValue={(val) => setItbiEscritura({ ...itbiEscritura, value: val })} onChangeType={(t) => setItbiEscritura({ ...itbiEscritura, type: t })} description="Imposto de Transmissão" />

                        {escrituraMode === 'pr' ? (
                          <>
                            <TaxInput label="Escritura de Compra" value={Math.round(lavraturaCost * 100) / 100} type="fixed" disabled description={escrituraExtrapolada ? "Acima do teto da tabela (226 mil) — confirme no tabelionato" : "Tabela XI/TJ-PR 2026"} />
                            <TaxInput label="Funrejus Obrigatório" value={Math.round(funrejusCost * 100) / 100} type="fixed" disabled description="Automático (0.2% Teto PR)" />
                            <TaxInput label="Registo de Imóveis" value={Math.round(cartorioCostEsc * 100) / 100} type="fixed" disabled description="Tabela III-C/TJ-PR 2026" />
                          </>
                        ) : (
                          <>
                            <TaxInput label="Escritura de Compra" value={escrituraManual.value} type={escrituraManual.type} onChangeValue={(val) => setEscrituraManual({ ...escrituraManual, value: val })} onChangeType={(t) => setEscrituraManual({ ...escrituraManual, type: t })} description="Tabelionato" />
                            <TaxInput label="Funrejus Obrigatório" value={Math.round(funrejusCost * 100) / 100} type="fixed" disabled description="Compulsório (0.2% Teto PR)" />
                            <TaxInput label="Registo de Imóveis" value={rgiManual.value} type={rgiManual.type} onChangeValue={(val) => setRgiManual({ ...rgiManual, value: val })} onChangeType={(t) => setRgiManual({ ...rgiManual, type: t })} description="Cartório de Registo" />
                          </>
                        )}
                    </div>
                    {escrituraMode === 'pr' && escrituraExtrapolada && (
                      <div className="mt-2 p-3 rounded-lg bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-900 text-[11px] text-amber-800 dark:text-amber-300 font-medium">
                        A tabela oficial de emolumentos do Tabelionato de Notas (Tabela XI) não define faixas para valores acima de R$226.000,00. O valor exibido usa a última faixa conhecida como estimativa mínima — confirme o valor exato diretamente com o tabelionato.
                      </div>
                    )}

                    <div className="mt-6 pt-4 border-t border-slate-100 dark:border-slate-800">
                        <label className="flex items-start sm:items-center gap-3 p-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl cursor-pointer">
                          <input type="checkbox" checked={incluirRgi} onChange={(e) => setIncluirRgi(e.target.checked)} className="w-5 h-5 mt-0.5 sm:mt-0 text-indigo-600 rounded" />
                          <span className="text-sm font-bold text-slate-700 dark:text-slate-200">Incluir Registo de Imóveis (RGI) no extrato final</span>
                        </label>
                    </div>
                  </Card>

                  <Card title="Custos Acessórios" icon={FileText}>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <MoneyInput label="Certidões e Buscas" value={certidoesEsc} onChange={setCertidoesEsc} />
                      <MoneyInput label="Diligências / Assessoria" value={diligenciasEsc} onChange={setDiligenciasEsc} />
                    </div>
                  </Card>
                </div>

                {/* VISUALIZAÇÃO DO PDF / RESULTADO (ESCRITURA) */}
                <div className="space-y-4 sm:space-y-6 mt-6 lg:mt-0">
                  <div id="pdf-escritura" className="bg-white dark:bg-slate-900 rounded-2xl shadow-xl sm:shadow-sm border border-slate-200 dark:border-slate-800 p-4 sm:p-8 print:border-none print:p-0">

                    {/* Header Limpo Sem Dados de Controle ou Configuração */}
                    <div className="mb-6 pb-4 border-b border-slate-200 dark:border-slate-800 flex flex-col sm:flex-row justify-between items-start gap-2 sm:gap-0">
                      <div>
                        <h2 className="text-lg sm:text-xl font-extrabold text-slate-900 dark:text-white uppercase tracking-tight">Memorial de Custas de Escrituração</h2>
                        <p className="text-xs sm:text-sm font-semibold text-slate-500 dark:text-slate-400 mt-0.5">{advName} — {advOab}</p>
                      </div>
                      <div className="text-left sm:text-right text-[10px] text-slate-400 uppercase tracking-wider font-bold">
                        Simulação Estimativa
                      </div>
                    </div>

                    {/* Dados do Cliente */}
                    {(clienteNome || imovelDesc) && (
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 p-4 bg-slate-50 dark:bg-slate-800/40 rounded-xl border border-slate-100 dark:border-slate-800 mb-6">
                        {clienteNome && (
                          <div>
                            <span className="text-[10px] uppercase font-bold text-slate-400 block">Adquirente / Outorgado</span>
                            <span className="text-sm font-bold text-slate-800 dark:text-slate-200">{clienteNome}</span>
                          </div>
                        )}
                        {imovelDesc && (
                          <div>
                            <span className="text-[10px] uppercase font-bold text-slate-400 block">Objeto / Imóvel</span>
                            <span className="text-sm font-bold text-slate-800 dark:text-slate-200">{imovelDesc}</span>
                          </div>
                        )}
                      </div>
                    )}

                    <h4 className="font-bold text-slate-800 dark:text-slate-100 mb-4 text-xs uppercase tracking-wider text-slate-500">Detalhamento Financeiro</h4>

                    {/* Bloco 1: Inicial */}
                    <div className="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-100 dark:border-slate-800 mb-4">
                      <h5 className="text-xs font-bold uppercase text-slate-500 mb-3">Passo 1: Lavratura, Impostos e Acessórios</h5>
                      <ul className="space-y-3 text-sm">
                        <li className="flex justify-between pb-2 border-b border-dashed border-slate-200 dark:border-slate-700">
                          <span>Base da Transação</span>
                          <span className="font-bold text-slate-900 dark:text-white">{formatMoney(safeNegocio)}</span>
                        </li>
                        <li className="flex justify-between text-slate-600 dark:text-slate-400">
                          <span>Imposto de Transmissão (ITBI){safeNumber(valorVenalEsc) > safeNegocio ? ' (s/ valor venal)' : ''}</span>
                          <span className="font-medium">+{formatMoney(itbiCostEsc)}</span>
                        </li>
                        <li className="flex justify-between text-slate-600 dark:text-slate-400">
                          <span>Ato de Escrituração Imobiliária</span>
                          <span className="font-medium">+{formatMoney(lavraturaCost)}</span>
                        </li>
                        <li className="flex justify-between text-slate-600 dark:text-slate-400">
                          <span>Funrejus Compulsório (0.2% - TJPR)</span>
                          <span className="font-medium">+{formatMoney(funrejusCost)}</span>
                        </li>

                        {safeNumber(certidoesEsc) > 0 && (
                          <li className="flex justify-between text-slate-600 dark:text-slate-400">
                            <span>Certidões e Buscas</span>
                            <span className="font-medium">+{formatMoney(safeNumber(certidoesEsc))}</span>
                          </li>
                        )}
                        {safeNumber(diligenciasEsc) > 0 && (
                          <li className="flex justify-between text-slate-600 dark:text-slate-400">
                            <span>Diligências / Assessoria</span>
                            <span className="font-medium">+{formatMoney(safeNumber(diligenciasEsc))}</span>
                          </li>
                        )}

                        <li className="flex justify-between font-bold pt-3 mt-2 border-t border-slate-200 dark:border-slate-700">
                          <span className="text-slate-800 dark:text-slate-200">Subtotal Sem Registro</span>
                          <span className="text-indigo-600 dark:text-indigo-400">{formatMoney(custoInicialEsc)}</span>
                        </li>
                      </ul>
                    </div>

                    {/* Bloco 2: Registro */}
                    {incluirRgi && (
                      <div className="p-4 rounded-xl border border-indigo-100 dark:border-indigo-900/30 bg-indigo-50/50 dark:bg-indigo-950/10 mb-4">
                        <h5 className="text-xs font-bold uppercase text-slate-500 mb-2">Passo 2: Registro de Imóveis (RGI)</h5>
                        <ul className="space-y-2 text-sm">
                          <li className="flex justify-between font-medium">
                            <span className="text-indigo-900 dark:text-indigo-300">Emolumento de Registro</span>
                            <span className="text-indigo-700 dark:text-indigo-400">+{formatMoney(cartorioCostEsc)}</span>
                          </li>
                        </ul>
                      </div>
                    )}

                    {/* Resumo Final Múltiplo para PDF */}
                    <div className="bg-slate-900 text-white rounded-xl p-4 sm:p-5 mt-6">
                        <h5 className="text-[10px] font-bold uppercase text-slate-400 mb-4 text-center tracking-widest">Apurado Geral do Orçamento</h5>

                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center text-sm mb-3 pb-3 border-b border-slate-800 gap-1 sm:gap-0">
                            <span className="text-slate-400">Total Documentação Inicial (Passo 1)</span>
                            <span className="font-semibold text-lg sm:text-sm">{formatMoney(custoInicialEsc)}</span>
                        </div>

                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center font-extrabold text-xl sm:text-lg text-emerald-400 gap-1 sm:gap-0">
                            <span>Apurado Final Com Registro (RGI)</span>
                            <span>{formatMoney(totalEscrituraComRegistro)}</span>
                        </div>
                    </div>

                    <div className="mt-8 text-[9px] text-slate-400 text-justify leading-relaxed">
                      <strong>Nota Legal:</strong> Este relatório é de natureza estimativa e consultiva para fins de planejamento financeiro. As custas notariais e de registo seguem as tabelas de emolumentos do TJ-PR vigentes desde {VIGENCIA_TABELAS_PR} e podem variar conforme o cartório competente ou reajuste anual.
                    </div>

                    <div className="flex flex-col sm:flex-row gap-3 mt-8 print-hide">
                      <button onClick={handleReset} className="w-full sm:w-auto px-6 py-4 sm:py-3 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold rounded-xl transition-all">Limpar</button>
                      <button onClick={handleCopyResumo} className="w-full sm:w-auto px-6 py-4 sm:py-3 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold rounded-xl transition-all">Copiar Resumo</button>
                      <button onClick={handleShareWhatsapp} className="w-full sm:w-auto px-6 py-4 sm:py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition-all">WhatsApp</button>
                      <button onClick={handlePrint} className="w-full flex-1 flex items-center justify-center gap-2 py-4 sm:py-3 bg-slate-900 text-white font-bold rounded-xl transition-all shadow-lg">
                        <Printer className="w-5 h-5" /> Gerar PDF do Orçamento
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
