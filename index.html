<!DOCTYPE html>
<html lang="pt-BR" class="antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central de Cálculos Imobiliários</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Otimização extrema para PDF de 1 Página e sem URL do navegador */
    @page {
      size: A4;
      margin: 10mm; 
    }
    @media print {
      body { 
        -webkit-print-color-adjust: exact; 
        print-color-adjust: exact; 
        background-color: white !important; 
        color: black !important;
      }
      .print-hide { display: none !important; }
      .print-no-shadow { box-shadow: none !important; border: 1px solid #cbd5e1 !important; }
      .print-page-wrapper { margin: 0 !important; padding: 0 !important; }
      
      .dark .print\:text-black { color: black !important; }
      .dark .print\:bg-white { background-color: white !important; }
      .dark .print\:border-slate-300 { border-color: #cbd5e1 !important; }
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Ícones SVG ---
    const Building = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2Z"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2Z"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>;
    const FileText = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
    const Printer = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
    const Settings = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
    const Moon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;
    const Sun = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;

    // --- Helpers Formatação ---
    const formatMoney = (val) => {
      if (val === '' || val == null) return 'R$ 0,00';
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
    };

    const safeNumber = (val) => (val === '' ? 0 : Number(val));

    // --- Componentes de Input ---
    const TextInput = ({ label, value, onChange, placeholder }) => (
      <div className="mb-4">
        <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">{label}</label>
        <input type="text" value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} className="block w-full px-4 py-2.5 sm:text-sm font-medium border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none" />
      </div>
    );

    const MoneyInput = ({ label, value, onChange, placeholder }) => (
      <div className="mb-4">
        <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">{label}</label>
        <div className="relative rounded-xl shadow-sm">
          <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span className="text-slate-500 font-medium sm:text-sm">R$</span></div>
          <input type="number" min="0" value={value === '' ? '' : value} onChange={(e) => onChange(e.target.value === '' ? '' : Number(e.target.value))} className="block w-full pl-10 pr-4 py-2.5 sm:text-sm font-semibold border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none" placeholder={placeholder || "0,00"} />
        </div>
        <div className="text-xs text-slate-500 mt-1 ml-1 font-medium h-4">{value !== '' && formatMoney(value)}</div>
      </div>
    );

    const TaxInput = ({ label, value, onChangeValue, type, onChangeType, description, disabled }) => (
      <div className="mb-4">
        <div className="flex justify-between items-end mb-1.5">
          <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300">{label}</label>
          {!disabled && (
            <div className="flex bg-slate-200 dark:bg-slate-700 rounded-lg p-0.5">
              <button onClick={() => onChangeType('percent')} className={`px-2 py-0.5 text-[10px] uppercase font-bold rounded-md transition-colors ${type === 'percent' ? 'bg-white dark:bg-slate-800 text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>%</button>
              <button onClick={() => onChangeType('fixed')} className={`px-2 py-0.5 text-[10px] uppercase font-bold rounded-md transition-colors ${type === 'fixed' ? 'bg-white dark:bg-slate-800 text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>R$</button>
            </div>
          )}
        </div>
        <div className="relative rounded-xl shadow-sm">
          {(type === 'fixed' || disabled) && (
            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span className="text-slate-500 font-medium sm:text-sm">R$</span></div>
          )}
          <input
            type="number" min="0" disabled={disabled} step={type === 'percent' ? "0.1" : "1"}
            value={value === '' ? '' : value}
            onChange={(e) => onChangeValue(e.target.value === '' ? '' : Number(e.target.value))}
            className={`block w-full ${(type === 'fixed' || disabled) ? 'pl-10 pr-4' : 'pl-4 pr-10'} py-2.5 sm:text-sm font-medium border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all disabled:opacity-75`}
            placeholder="0"
          />
          {type === 'percent' && !disabled && (
            <div className="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none"><span className="text-slate-500 font-medium sm:text-sm">%</span></div>
          )}
        </div>
        <div className="flex justify-between items-center mt-1.5 ml-1 h-4">
          {description && <div className="text-[11px] text-slate-500">{description}</div>}
          {(type === 'fixed' || disabled) && value !== '' && <div className="text-[11px] text-slate-500 font-medium">{formatMoney(value)}</div>}
        </div>
      </div>
    );

    const Card = ({ title, icon: Icon, children, extraHeader }) => (
      <div className="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm p-6 print-no-shadow print-tight relative">
        <div className="flex justify-between items-center mb-5">
            <h3 className="text-base font-bold text-slate-800 dark:text-slate-200 flex items-center gap-2">
            {Icon && <Icon className="w-5 h-5 text-indigo-600" />} {title}
            </h3>
            {extraHeader}
        </div>
        {children}
      </div>
    );

    // --- Matemática Paraná (TJ-PR Lei 21.869/2023) ---
    const obterEmolumentoBasePR = (valor) => {
      if (valor <= 56000) return 349.02;
      if (valor <= 66000) return 411.34;
      if (valor <= 76000) return 473.67;
      if (valor <= 86000) return 535.99;
      if (valor <= 96000) return 598.32;
      if (valor <= 106000) return 660.64;
      if (valor <= 116000) return 722.97;
      if (valor <= 126000) return 785.29;
      if (valor <= 136000) return 847.62;
      if (valor <= 146000) return 909.94;
      if (valor <= 156000) return 972.27;
      if (valor <= 166000) return 1011.60;
      if (valor <= 176000) return 1072.54;
      if (valor <= 186000) return 1133.48;
      if (valor <= 196000) return 1194.42;
      return 1377.24; 
    };

    const calcularRegistroPR = (valor) => {
      if (!valor) return 0;
      const base = obterEmolumentoBasePR(valor);
      const fadep = base * 0.05;
      const selo = 8.00;
      const prenotacaoEArq = 3.85 + 2.78;
      const iss = (base + 2.77 + 1.94) * 0.03;
      return base + fadep + selo + prenotacaoEArq + iss;
    };

    const calcularEscrituraPR = (valor) => {
      if (!valor) return 0;
      const base = obterEmolumentoBasePR(valor) * 1.15; 
      const fadep = base * 0.05;
      const selo = 8.00;
      const iss = base * 0.03;
      return base + fadep + selo + iss;
    };

    const calcularFunrejus = (valor) => {
      if (!valor) return 0;
      const teto = 7408.87;
      const calc = valor * 0.002;
      return calc > teto ? teto : calc;
    };

    // --- App Principal ---
    function App() {
      // Carregamento de Configurações da Memória Local
      const loadInitialState = () => {
          const savedData = localStorage.getItem('central_calc_imob_v4');
          if (savedData) {
              return JSON.parse(savedData);
          }
          return null;
      };

      const initialState = loadInitialState();

      // Configurações Globais
      const [advName, setAdvName] = useState(initialState?.advName || "Thiago Reis - Assessoria Jurídica");
      const [advOab, setAdvOab] = useState(initialState?.advOab || "OAB/PR 115.608");
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [darkMode, setDarkMode] = useState(initialState?.darkMode || false);
      const [activeTab, setActiveTab] = useState(initialState?.activeTab || 'leilao');

      // Estados: LEILÃO
      const [evalValue, setEvalValue] = useState(initialState?.evalValue || '');
      const [bidValue, setBidValue] = useState(initialState?.bidValue || '');
      const [maxBudget, setMaxBudget] = useState(initialState?.maxBudget || '');
      const [leiloeiro, setLeiloeiro] = useState(initialState?.leiloeiro || { value: 5, type: 'percent' });
      const [itbi, setItbi] = useState(initialState?.itbi || { value: 2, type: 'percent' });
      const [legal, setLegal] = useState(initialState?.legal || { value: 5, type: 'percent' });
      const [cartorioModeLeilao, setCartorioModeLeilao] = useState(initialState?.cartorioModeLeilao || 'pr');
      const [cartorioManualLeilao, setCartorioManualLeilao] = useState(initialState?.cartorioManualLeilao || { value: 2, type: 'percent' });
      const [debts, setDebts] = useState(initialState?.debts || '');
      const [renovation, setRenovation] = useState(initialState?.renovation || '');
      
      // Estados: ESCRITURA
      const [clienteNome, setClienteNome] = useState(initialState?.clienteNome || '');
      const [imovelDesc, setImovelDesc] = useState(initialState?.imovelDesc || '');
      const [negocioValor, setNegocioValor] = useState(initialState?.negocioValor || '');
      const [incluirRgi, setIncluirRgi] = useState(initialState?.incluirRgi ?? true);
      const [escrituraMode, setEscrituraMode] = useState(initialState?.escrituraMode || 'pr');
      
      const [itbiEscritura, setItbiEscritura] = useState(initialState?.itbiEscritura?.type ? initialState.itbiEscritura : { value: 2, type: 'percent' });
      const [escrituraManual, setEscrituraManual] = useState(initialState?.escrituraManual || { value: '', type: 'fixed' });
      const [rgiManual, setRgiManual] = useState(initialState?.rgiManual || { value: '', type: 'fixed' });

      // Salva na memória local sempre que algo altera
      useEffect(() => {
          const stateToSave = {
              advName, advOab, darkMode, activeTab, evalValue, bidValue, maxBudget, leiloeiro, itbi, legal, cartorioModeLeilao, cartorioManualLeilao, debts, renovation, 
              clienteNome, imovelDesc, negocioValor, incluirRgi, escrituraMode, itbiEscritura, escrituraManual, rgiManual
          };
          localStorage.setItem('central_calc_imob_v4', JSON.stringify(stateToSave));
      }, [advName, advOab, darkMode, activeTab, evalValue, bidValue, maxBudget, leiloeiro, itbi, legal, cartorioModeLeilao, cartorioManualLeilao, debts, renovation, clienteNome, imovelDesc, negocioValor, incluirRgi, escrituraMode, itbiEscritura, escrituraManual, rgiManual]);

      // Efeito de Tema
      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      // Impressão Perfeita
      const handlePrint = () => {
        const wasDark = darkMode;
        if(wasDark) setDarkMode(false);
        setTimeout(() => {
          window.print();
          if(wasDark) setDarkMode(true);
        }, 100);
      };

      // Reset
      const handleReset = () => {
        if(window.confirm("Zerar valores desta aba?")) {
            if(activeTab === 'leilao') {
                setEvalValue(''); setBidValue(''); setMaxBudget(''); setDebts(''); setRenovation('');
            } else {
                setClienteNome(''); setImovelDesc(''); setNegocioValor('');
                setItbiEscritura({ value: 2, type: 'percent' });
                setEscrituraManual({ value: '', type: 'fixed' });
                setRgiManual({ value: '', type: 'fixed' });
                setEscrituraMode('pr');
            }
        }
      };

      // Engenharia Reversa (Leilão)
      const handleSuggestBid = () => {
        const budget = safeNumber(maxBudget);
        const fixed = safeNumber(debts) + safeNumber(renovation);
        let low = 0, high = budget, bestBid = 0;

        for (let i = 0; i < 50; i++) {
          let mid = (low + high) / 2;
          let lCost = leiloeiro.type === 'percent' ? mid * (leiloeiro.value/100) : safeNumber(leiloeiro.value);
          let iCost = itbi.type === 'percent' ? mid * (itbi.value/100) : safeNumber(itbi.value);
          let legCost = legal.type === 'percent' ? mid * (legal.value/100) : safeNumber(legal.value);
          
          let cCost = 0;
          if(cartorioModeLeilao === 'pr') cCost = calcularRegistroPR(mid);
          else cCost = cartorioManualLeilao.type === 'percent' ? mid * (cartorioManualLeilao.value/100) : safeNumber(cartorioManualLeilao.value);

          let total = mid + lCost + iCost + legCost + cCost + fixed;
          if (total > budget) high = mid;
          else { bestBid = mid; low = mid; }
        }
        setBidValue(Math.floor(bestBid));
      };

      const calcTax = (taxState, baseValue) => {
        const val = safeNumber(taxState.value);
        if (taxState.type === 'percent') return baseValue * (val / 100);
        return val;
      };

      // --- Matemática Renderização: LEILÃO ---
      const safeBid = safeNumber(bidValue);
      const leiloeiroCost = calcTax(leiloeiro, safeBid);
      const itbiCostLeilao = calcTax(itbi, safeBid);
      const legalCost = calcTax(legal, safeBid);
      
      let cartorioCostLeilao = 0;
      if (cartorioModeLeilao === 'pr') cartorioCostLeilao = calcularRegistroPR(safeBid);
      else cartorioCostLeilao = calcTax(cartorioManualLeilao, safeBid);

      const fixedCostsLeilao = safeNumber(debts) + safeNumber(renovation);
      const finalLeilao = safeBid + leiloeiroCost + itbiCostLeilao + legalCost + cartorioCostLeilao + fixedCostsLeilao;
      
      // --- Matemática Renderização: ESCRITURA ---
      const safeNegocio = safeNumber(negocioValor);
      const itbiCostEsc = calcTax(itbiEscritura, safeNegocio);
      
      // O FUNREJUS É SEMPRE AUTOMÁTICO (0.2% com Teto PR)
      const funrejusCost = calcularFunrejus(safeNegocio);

      let lavraturaCost = 0;
      let cartorioCostEsc = 0;

      if (escrituraMode === 'pr') {
          lavraturaCost = calcularEscrituraPR(safeNegocio);
          cartorioCostEsc = calcularRegistroPR(safeNegocio);
      } else {
          lavraturaCost = calcTax(escrituraManual, safeNegocio);
          cartorioCostEsc = calcTax(rgiManual, safeNegocio);
      }
      
      // Custo Inicial (Documentação Base SEM Registo) - FUNREJUS SEMPRE INCLUÍDO AQUI
      const custoInicialEsc = itbiCostEsc + lavraturaCost + funrejusCost;
      
      // Custo Total Geral (Com Registo)
      const totalEscrituraComRegistro = custoInicialEsc + cartorioCostEsc;

      return (
        <div className="min-h-screen pb-20 print-page-wrapper">
          
          {/* Menu Superior e Configurações */}
          <div className="bg-slate-900 text-white print-hide pt-8 pb-12 px-4">
            <div className="max-w-5xl mx-auto">
              <div className="flex justify-between items-start mb-6">
                <div>
                  <h1 className="text-2xl sm:text-3xl font-extrabold tracking-tight">{advName}</h1>
                  <p className="text-slate-400 font-medium text-sm mt-1">{advOab}</p>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setDarkMode(!darkMode)} className="p-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-300">
                    {darkMode ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
                  </button>
                  <button onClick={() => setIsSettingsOpen(!isSettingsOpen)} className="p-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-300">
                    <Settings className="w-5 h-5" />
                  </button>
                </div>
              </div>

              {isSettingsOpen && (
                <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 mb-6">
                  <h3 className="text-sm font-bold mb-3 text-slate-200">Configurações do Relatório</h3>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <TextInput label="Nome do Profissional/Escritório" value={advName} onChange={setAdvName} />
                    <TextInput label="Registro (OAB/CRECI)" value={advOab} onChange={setAdvOab} />
                  </div>
                </div>
              )}

              {/* Abas */}
              <div className="flex gap-2 bg-slate-800/50 p-1 rounded-xl w-fit border border-slate-700/50">
                <button onClick={() => setActiveTab('leilao')} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === 'leilao' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-white'}`}>Arrematação (Leilão)</button>
                <button onClick={() => setActiveTab('escritura')} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === 'escritura' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-white'}`}>Compra, Venda e RGI</button>
              </div>
            </div>
          </div>

          <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 -mt-6 print:mt-0 print:px-0">
            
            {/* --- ABA LEILÃO --- */}
            {activeTab === 'leilao' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="space-y-6 print-hide">
                  <Card title="Orçamento e Lance" icon={Building}>
                    <div className="bg-indigo-50 dark:bg-indigo-900/20 p-4 rounded-xl border border-indigo-100 dark:border-indigo-800/50 mb-5">
                      <MoneyInput label="Orçamento Máximo Desejado" value={maxBudget} onChange={setMaxBudget} />
                      <button onClick={handleSuggestBid} className="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg text-sm">Calcular Lance Ideal</button>
                    </div>
                    <MoneyInput label="Valor do Lance no Leilão" value={bidValue} onChange={setBidValue} />
                    <MoneyInput label="Valor de Avaliação" value={evalValue} onChange={setEvalValue} />
                  </Card>
                  
                  <Card 
                    title="Taxas e Comissões" 
                    icon={FileText}
                    extraHeader={
                      <div className="flex bg-slate-100 dark:bg-slate-800 p-0.5 rounded-lg border border-slate-200/50 dark:border-slate-700">
                        <button onClick={() => setCartorioModeLeilao('pr')} className={`px-2 py-1 text-[10px] sm:text-xs font-bold rounded-md transition-all ${cartorioModeLeilao === 'pr' ? 'bg-indigo-600 text-white shadow' : 'text-slate-500 hover:text-slate-800'}`}>Auto PR</button>
                        <button onClick={() => setCartorioModeLeilao('manual')} className={`px-2 py-1 text-[10px] sm:text-xs font-bold rounded-md transition-all ${cartorioModeLeilao === 'manual' ? 'bg-indigo-600 text-white shadow' : 'text-slate-500 hover:text-slate-800'}`}>Manual</button>
                      </div>
                    }
                  >
                    <div className="grid grid-cols-2 gap-4">
                        <TaxInput label="Leiloeiro" value={leiloeiro.value} type={leiloeiro.type} onChangeValue={(val) => setLeiloeiro({ ...leiloeiro, value: val })} onChangeType={(t) => setLeiloeiro({ ...leiloeiro, type: t })} description="Padrão: 5%" />
                        <TaxInput label="ITBI (Imposto)" value={itbi.value} type={itbi.type} onChangeValue={(val) => setItbi({ ...itbi, value: val })} onChangeType={(t) => setItbi({ ...itbi, type: t })} description="Padrão: 2%" />
                        
                        {cartorioModeLeilao === 'pr' ? (
                        <TaxInput label="Cartório (Lei PR)" value={Math.round(cartorioCostLeilao * 100) / 100} type="fixed" disabled description="Lei 21.869-PR" />
                        ) : (
                        <TaxInput label="Registo Imóveis" value={cartorioManualLeilao.value} type={cartorioManualLeilao.type} onChangeValue={(val) => setCartorioManualLeilao({ ...cartorioManualLeilao, value: val })} onChangeType={(t) => setCartorioManualLeilao({ ...cartorioManualLeilao, type: t })} description="Custas manuais" />
                        )}
                        
                        <TaxInput label="Assessoria Jurídica" value={legal.value} type={legal.type} onChangeValue={(val) => setLegal({ ...legal, value: val })} onChangeType={(t) => setLegal({ ...legal, type: t })} description="Honorários" />
                    </div>
                  </Card>

                  <Card title="Custos Extras" icon={FileText}>
                    <MoneyInput label="Dívidas Assumidas (IPTU/Cond.)" value={debts} onChange={setDebts} />
                    <MoneyInput label="Reformas e Desocupação" value={renovation} onChange={setRenovation} />
                  </Card>
                </div>

                <div className="space-y-6">
                  <div className="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6 print-no-shadow print:border-none print:p-0">
                    
                    <div className="hidden print:block mb-6 pb-4 border-b border-slate-200">
                      <h2 className="text-xl font-bold text-slate-900 uppercase">Relatório de Viabilidade de Leilão</h2>
                      <p className="text-sm font-bold text-slate-600">{advName} • {advOab}</p>
                    </div>

                    <h4 className="font-bold text-slate-800 dark:text-slate-100 print:text-black mb-4">Extrato da Arrematação</h4>
                    <ul className="space-y-2.5 text-sm print:text-black">
                      <li className="flex justify-between font-bold text-base pb-2 border-b border-slate-100">
                        <span>Valor do Lance</span> <span>{formatMoney(safeBid)}</span>
                      </li>
                      <li className="flex justify-between text-slate-600 dark:text-slate-400 print:text-slate-800">
                        <span>Comissão Leiloeiro ({leiloeiro.type === 'percent' ? `${leiloeiro.value}%` : 'Fixo'})</span> <span className="text-rose-500">+{formatMoney(leiloeiroCost)}</span>
                      </li>
                      <li className="flex justify-between text-slate-600 dark:text-slate-400 print:text-slate-800">
                        <span>ITBI ({itbi.type === 'percent' ? `${itbi.value}%` : 'Fixo'})</span> <span className="text-rose-500">+{formatMoney(itbiCostLeilao)}</span>
                      </li>
                      
                      {cartorioModeLeilao === 'pr' ? (
                        <li className="flex justify-between text-slate-600 dark:text-slate-400 print:text-slate-800">
                            <span>Registo de Imóveis (Regra PR)</span> <span className="text-rose-500">+{formatMoney(cartorioCostLeilao)}</span>
                        </li>
                      ) : (
                         <li className="flex justify-between text-slate-600 dark:text-slate-400 print:text-slate-800">
                            <span>Registo de Imóveis (Manual)</span> <span className="text-rose-500">+{formatMoney(cartorioCostLeilao)}</span>
                        </li> 
                      )}

                      <li className="flex justify-between text-slate-600 dark:text-slate-400 print:text-slate-800">
                        <span>Assessoria Jurídica ({legal.type === 'percent' ? `${legal.value}%` : 'Fixo'})</span> <span className="text-rose-500">+{formatMoney(legalCost)}</span>
                      </li>
                      <li className="flex justify-between text-slate-600 dark:text-slate-400 print:text-slate-800 pt-2 border-t border-slate-100">
                        <span>Passivos e Reformas</span> <span className="text-amber-500">+{formatMoney(fixedCostsLeilao)}</span>
                      </li>
                      <li className="flex justify-between font-extrabold text-lg pt-4 mt-2 border-t border-slate-200 print:border-slate-300">
                        <span>Custo Total Estimado</span> <span className="text-indigo-600 print:text-black">{formatMoney(finalLeilao)}</span>
                      </li>
                    </ul>

                    <div className="flex gap-2 mt-6 print-hide">
                      <button onClick={handleReset} className="flex-1 py-3 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold rounded-xl transition-all">Limpar</button>
                      <button onClick={handlePrint} className="flex-[2] flex items-center justify-center gap-2 py-3 bg-slate-900 text-white font-bold rounded-xl transition-all">
                        <Printer className="w-4 h-4" /> Imprimir Relatório
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* --- ABA ESCRITURA E COMPRA --- */}
            {activeTab === 'escritura' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="space-y-6 print-hide">
                  <Card title="Dados do Negócio" icon={Building}>
                    <TextInput label="Nome do Cliente" value={clienteNome} onChange={setClienteNome} placeholder="Ex: João Silva" />
                    <TextInput label="Descrição do Imóvel" value={imovelDesc} onChange={setImovelDesc} placeholder="Ex: Apto 201 - Curitiba" />
                    <MoneyInput label="Valor Base do Negócio" value={negocioValor} onChange={setNegocioValor} />
                  </Card>
                  
                  <Card 
                    title="Custos e Impostos" 
                    icon={FileText}
                    extraHeader={
                      <div className="flex bg-slate-100 dark:bg-slate-800 p-0.5 rounded-lg border border-slate-200/50 dark:border-slate-700">
                        <button onClick={() => setEscrituraMode('pr')} className={`px-2 py-1 text-[10px] sm:text-xs font-bold rounded-md transition-all ${escrituraMode === 'pr' ? 'bg-indigo-600 text-white shadow' : 'text-slate-500 hover:text-slate-800'}`}>Auto PR</button>
                        <button onClick={() => setEscrituraMode('manual')} className={`px-2 py-1 text-[10px] sm:text-xs font-bold rounded-md transition-all ${escrituraMode === 'manual' ? 'bg-indigo-600 text-white shadow' : 'text-slate-500 hover:text-slate-800'}`}>Manual</button>
                      </div>
                    }
                  >
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <TaxInput label="Taxa ITBI" value={itbiEscritura.value} type={itbiEscritura.type} onChangeValue={(val) => setItbiEscritura({ ...itbiEscritura, value: val })} onChangeType={(t) => setItbiEscritura({ ...itbiEscritura, type: t })} description="Imposto de Transmissão" />
                        
                        {escrituraMode === 'pr' ? (
                          <>
                            <TaxInput label="Escritura" value={Math.round(lavraturaCost * 100) / 100} type="fixed" disabled description="Calculado (Regra PR)" />
                            {/* O Funrejus é sempre automático de 0.2% em ambos os modos */}
                            <TaxInput label="Funrejus (0.2%)" value={Math.round(funrejusCost * 100) / 100} type="fixed" disabled description="Automático (0.2% Teto PR)" />
                            <TaxInput label="Registo (RGI)" value={Math.round(cartorioCostEsc * 100) / 100} type="fixed" disabled description="Calculado (Regra PR)" />
                          </>
                        ) : (
                          <>
                            <TaxInput label="Escritura" value={escrituraManual.value} type={escrituraManual.type} onChangeValue={(val) => setEscrituraManual({ ...escrituraManual, value: val })} onChangeType={(t) => setEscrituraManual({ ...escrituraManual, type: t })} description="Tabelionato" />
                            {/* No modo Manual, o Funrejus permanece trancado e automático! */}
                            <TaxInput label="Funrejus (0.2%)" value={Math.round(funrejusCost * 100) / 100} type="fixed" disabled description="Compulsório (0.2% Teto PR)" />
                            <TaxInput label="Registo (RGI)" value={rgiManual.value} type={rgiManual.type} onChangeValue={(val) => setRgiManual({ ...rgiManual, value: val })} onChangeType={(t) => setRgiManual({ ...rgiManual, type: t })} description="Cartório de Imóveis" />
                          </>
                        )}
                    </div>

                    <div className="mt-6 pt-4 border-t border-slate-100 dark:border-slate-800">
                        <label className="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl cursor-pointer">
                        <input type="checkbox" checked={incluirRgi} onChange={(e) => setIncluirRgi(e.target.checked)} className="w-5 h-5 text-indigo-600 rounded" />
                        <span className="text-sm font-bold text-slate-700 dark:text-slate-200">Incluir Registo (RGI) no extrato final</span>
                        </label>
                    </div>
                  </Card>
                </div>

                <div className="space-y-6">
                  <div className="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6 print-no-shadow print:border-none print:p-0">
                    
                    <div className="hidden print:block mb-6 pb-4 border-b border-slate-200">
                      <h2 className="text-xl font-bold text-slate-900 uppercase">Orçamento de Documentação Imobiliária</h2>
                      <p className="text-sm font-bold text-slate-600">{advName} • {advOab}</p>
                      
                      {(clienteNome || imovelDesc) && (
                        <div className="mt-4 p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                          {clienteNome && <div><strong>Cliente:</strong> {clienteNome}</div>}
                          {imovelDesc && <div><strong>Imóvel:</strong> {imovelDesc}</div>}
                        </div>
                      )}
                    </div>

                    <h4 className="font-bold text-slate-800 dark:text-slate-100 print:text-black mb-4">Detalhamento dos Custos</h4>
                    
                    {/* Bloco 1: Inicial */}
                    <div className="bg-slate-50 dark:bg-slate-800/50 print:bg-white p-4 rounded-xl border border-slate-100 dark:border-slate-800 print:border-slate-300 mb-4">
                      <h5 className="text-xs font-bold uppercase text-slate-500 mb-2">Passo 1: Documentação e Impostos</h5>
                      <ul className="space-y-2 text-sm">
                        <li className="flex justify-between"><span>Base do Negócio</span> <span className="font-bold">{formatMoney(safeNegocio)}</span></li>
                        <li className="flex justify-between text-slate-600 print:text-black"><span>ITBI ({itbiEscritura.type === 'percent' ? `${itbiEscritura.value}%` : 'Fixo'})</span> <span>+{formatMoney(itbiCostEsc)}</span></li>
                        <li className="flex justify-between text-slate-600 print:text-black"><span>Escritura {escrituraMode === 'pr' ? '(Tabelionato PR)' : '(Manual)'}</span> <span>+{formatMoney(lavraturaCost)}</span></li>
                        
                        {/* O Funrejus é sempre exibido aqui com cálculo automático */}
                        <li className="flex justify-between text-slate-600 print:text-black"><span>Funrejus (0.2% - Teto TJ/PR)</span> <span>+{formatMoney(funrejusCost)}</span></li>
                        
                        <li className="flex justify-between font-bold pt-2 mt-2 border-t border-slate-200 print:border-slate-300">
                          <span>Subtotal Sem Registo</span> <span>{formatMoney(custoInicialEsc)}</span>
                        </li>
                      </ul>
                    </div>

                    {/* Bloco 2: Registo */}
                    <div className={`p-4 rounded-xl border mb-4 transition-all ${incluirRgi ? 'bg-indigo-50/50 dark:bg-indigo-900/10 border-indigo-100 dark:border-indigo-800/50 print:border-slate-300' : 'bg-slate-50 opacity-50 border-slate-100 print:hidden'}`}>
                      <h5 className="text-xs font-bold uppercase text-slate-500 mb-2">Passo 2: Registo de Imóveis</h5>
                      <ul className="space-y-2 text-sm">
                        <li className={`flex justify-between ${!incluirRgi && 'line-through'}`}>
                          <span>Custas RGI {escrituraMode === 'pr' ? '(Regra PR)' : '(Manual)'}</span> <span>+{formatMoney(cartorioCostEsc)}</span>
                        </li>
                      </ul>
                    </div>

                    {/* Resumo Final Múltiplo para PDF */}
                    <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl p-4 print:border-slate-400">
                        <h5 className="text-xs font-bold uppercase text-slate-500 mb-3 text-center">Resumo Final do Orçamento</h5>
                        
                        <div className="flex justify-between items-center text-sm font-semibold text-slate-600 dark:text-slate-300 mb-2 pb-2 border-b border-slate-100 dark:border-slate-700">
                            <span>Total p/ Documentação (Sem Registo)</span> 
                            <span>{formatMoney(custoInicialEsc)}</span>
                        </div>
                        
                        <div className="flex justify-between items-center font-extrabold text-lg text-indigo-700 dark:text-indigo-400 print:text-black">
                            <span>Total Geral (Com Registo RGI)</span> 
                            <span>{formatMoney(totalEscrituraComRegistro)}</span>
                        </div>
                    </div>

                    <div className="mt-6 text-[10px] text-slate-400 text-justify leading-relaxed print:text-black">
                      <strong>Aviso:</strong> Orçamento estimativo baseado na tabela de custas do PR (Lei 21.869/2023). Valores finais podem sofrer alterações no momento do protocolo oficial no cartório correspondente.
                    </div>

                    <div className="flex gap-2 mt-6 print-hide">
                      <button onClick={handleReset} className="flex-1 py-3 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold rounded-xl transition-all">Limpar</button>
                      <button onClick={handlePrint} className="flex-[2] flex items-center justify-center gap-2 py-3 bg-slate-900 text-white font-bold rounded-xl transition-all">
                        <Printer className="w-4 h-4" /> Gerar PDF do Orçamento
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
