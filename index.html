<!DOCTYPE html>
<html lang="pt-BR" class="antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Leilões - Thiago Reis</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
      .print-hide { display: none !important; }
      .print-no-shadow { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
      .print-tight { padding: 1rem !important; }
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Ícones ---
    const Building = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2Z"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2Z"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>;
    const Percent = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>;
    const Wallet = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3v1a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9"/></svg>;
    const TrendingUp = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
    const CheckCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const Printer = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
    const Target = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
    const RefreshCcw = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>;

    // --- Helpers ---
    const formatMoney = (value) => {
      if (value === '' || value === undefined || value === null) return 'R$ 0,00';
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
    };

    const formatNumber = (value) => {
      if (value === '' || value === undefined || value === null) return '0';
      return new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 2 }).format(value);
    };

    // --- Componentes Base ---
    const MoneyInput = ({ label, value, onChange, placeholder, disabled }) => (
      <div className="mb-4">
        <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">{label}</label>
        <div className="relative rounded-xl shadow-sm">
          <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <span className="text-slate-500 font-medium sm:text-sm">R$</span>
          </div>
          <input
            type="number" min="0" disabled={disabled}
            value={value === '' ? '' : value}
            onChange={(e) => onChange(e.target.value === '' ? '' : Number(e.target.value))}
            className="block w-full pl-10 pr-4 py-2.5 sm:text-sm font-semibold border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all hover:border-slate-300 disabled:opacity-50"
            placeholder={placeholder || "0,00"}
          />
        </div>
        <div className="text-xs text-slate-500 dark:text-slate-400 mt-2 ml-1 font-medium h-4">
           {value !== '' && formatMoney(value)}
        </div>
      </div>
    );

    const TaxInput = ({ label, value, onChangeValue, type, onChangeType, description, disabled }) => (
      <div className="mb-4">
        <div className="flex justify-between items-end mb-1.5">
          <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300">{label}</label>
          {!disabled && (
            <div className="flex bg-slate-200 dark:bg-slate-700 rounded-lg p-0.5">
              <button onClick={() => onChangeType('percent')} className={`px-2 py-0.5 text-[10px] uppercase font-bold rounded-md transition-colors ${type === 'percent' ? 'bg-white dark:bg-slate-800 text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>%</button>
              <button onClick={() => onChangeType('fixed')} className={`px-2 py-0.5 text-[10px] uppercase font-bold rounded-md transition-colors ${type === 'fixed' ? 'bg-white dark:bg-slate-800 text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>R$</button>
            </div>
          )}
        </div>
        <div className="relative rounded-xl shadow-sm">
          {(type === 'fixed' || disabled) && (
            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span className="text-slate-500 font-medium sm:text-sm">R$</span></div>
          )}
          <input
            type="number" min="0" disabled={disabled} step={type === 'percent' ? "0.1" : "1"}
            value={value === '' ? '' : value}
            onChange={(e) => onChangeValue(e.target.value === '' ? '' : Number(e.target.value))}
            className={`block w-full ${(type === 'fixed' || disabled) ? 'pl-10 pr-4' : 'pl-4 pr-10'} py-2.5 sm:text-sm font-medium border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800/50 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all disabled:opacity-75`}
            placeholder="0"
          />
          {type === 'percent' && !disabled && (
            <div className="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none"><span className="text-slate-500 font-medium sm:text-sm">%</span></div>
          )}
        </div>
        <div className="flex justify-between items-center mt-1.5 ml-1 h-4">
          {description && <div className="text-[11px] text-slate-500">{description}</div>}
          {(type === 'fixed' || disabled) && value !== '' && <div className="text-[11px] text-slate-500 font-medium">{formatMoney(value)}</div>}
        </div>
      </div>
    );

    const Card = ({ title, icon: Icon, children, extraHeader }) => (
      <div className="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200/70 dark:border-slate-800/80 shadow-md p-6 relative print-no-shadow print-tight">
        <div className="flex justify-between items-center mb-5">
          <h3 className="text-base font-bold text-slate-800 dark:text-slate-200 flex items-center gap-2">
            {Icon && <Icon className="w-5 h-5 text-indigo-600" />} {title}
          </h3>
          {extraHeader}
        </div>
        {children}
      </div>
    );

    // --- Default Data para Memória ---
    const defaultData = {
      marketValue: '',
      evaluationValue: '',
      bidValue: '',
      maxBudget: '',
      cartorioMode: 'pr',
      leiloeiro: { value: 5, type: 'percent' },
      itbi: { value: 2, type: 'percent' },
      cartorioManual: { value: 2, type: 'percent' },
      legal: { value: 5, type: 'percent' },
      debts: '',
      renovation: '',
      eviction: ''
    };

    function App() {
      // Carregar do LocalStorage ou usar Default
      const loadData = () => {
        try {
          const saved = localStorage.getItem('leilao_thiago_reis_v2');
          if (saved) return { ...defaultData, ...JSON.parse(saved) };
        } catch (e) { console.error("Erro ao carregar dados", e); }
        return defaultData;
      };

      const init = loadData();

      // Valores Principais
      const [marketValue, setMarketValue] = useState(init.marketValue);
      const [evaluationValue, setEvaluationValue] = useState(init.evaluationValue);
      const [bidValue, setBidValue] = useState(init.bidValue);
      const [maxBudget, setMaxBudget] = useState(init.maxBudget);
      
      const [cartorioMode, setCartorioMode] = useState(init.cartorioMode);
      const [leiloeiro, setLeiloeiro] = useState(init.leiloeiro);
      const [itbi, setItbi] = useState(init.itbi);
      const [cartorioManual, setCartorioManual] = useState(init.cartorioManual);
      const [legal, setLegal] = useState(init.legal);

      const [debts, setDebts] = useState(init.debts);
      const [renovation, setRenovation] = useState(init.renovation);
      const [eviction, setEviction] = useState(init.eviction);

      // Salvar no LocalStorage sempre que algo mudar
      useEffect(() => {
        const data = { marketValue, evaluationValue, bidValue, maxBudget, cartorioMode, leiloeiro, itbi, cartorioManual, legal, debts, renovation, eviction };
        localStorage.setItem('leilao_thiago_reis_v2', JSON.stringify(data));
      }, [marketValue, evaluationValue, bidValue, maxBudget, cartorioMode, leiloeiro, itbi, cartorioManual, legal, debts, renovation, eviction]);

      // Função Limpar/Zerar Calculadora
      const handleReset = () => {
        if(window.confirm("Deseja realmente iniciar um novo cálculo? Os valores preenchidos serão zerados (as taxas padrões serão mantidas).")) {
          setMarketValue('');
          setEvaluationValue('');
          setBidValue('');
          setMaxBudget('');
          setDebts('');
          setRenovation('');
          setEviction('');
          setItbi({ value: 2, type: 'percent' });
          setLeiloeiro({ value: 5, type: 'percent' });
          setLegal({ value: 5, type: 'percent' });
        }
      };

      const safeNumber = (val) => (val === '' ? 0 : Number(val));

      // --- MATEMÁTICA CARTÓRIO PR (LEI 21.869/2023) ---
      const obterEmolumentoPR = (valorLance) => {
        if (valorLance <= 56000) return 349.02;
        if (valorLance <= 66000) return 411.34;
        if (valorLance <= 76000) return 473.67;
        if (valorLance <= 86000) return 535.99;
        if (valorLance <= 96000) return 598.32;
        if (valorLance <= 106000) return 660.64;
        if (valorLance <= 116000) return 722.97;
        if (valorLance <= 126000) return 785.29;
        if (valorLance <= 136000) return 847.62;
        if (valorLance <= 146000) return 909.94;
        if (valorLance <= 156000) return 972.27;
        if (valorLance <= 166000) return 1011.60;
        if (valorLance <= 176000) return 1072.54;
        if (valorLance <= 186000) return 1133.48;
        if (valorLance <= 196000) return 1194.42;
        return 1377.24; 
      };

      const calculateCartorioPR = (valorLance) => {
        const emolumentoBase = obterEmolumentoPR(valorLance);
        const fadepRegistro = (emolumentoBase * 0.05);
        const seloRegistro = 8.00;
        const subtotalPrenotacao = 3.85; 
        const subtotalArquivamento = 2.78;
        const funrejusCalculado = valorLance * 0.002;
        const tetoFunrejus = 53 * 139.79;
        const funrejusFinal = funrejusCalculado > tetoFunrejus ? tetoFunrejus : funrejusCalculado;
        const issFinal = (emolumentoBase + 2.77 + 1.94) * 0.03;
        return emolumentoBase + fadepRegistro + seloRegistro + subtotalPrenotacao + subtotalArquivamento + funrejusFinal + issFinal;
      };

      const calcTax = (taxState, baseValue) => {
        const val = safeNumber(taxState.value);
        if (taxState.type === 'percent') return baseValue * (val / 100);
        return val;
      };

      // --- SIMULADOR ENGENHARIA REVERSA ---
      const handleSuggestBid = () => {
        const budget = safeNumber(maxBudget);
        const fixed = safeNumber(debts) + safeNumber(renovation) + safeNumber(eviction);
        
        if (budget <= fixed) {
          alert("O orçamento máximo precisa ser maior que a soma das dívidas, reformas e desocupação.");
          return;
        }

        // Busca Binária para achar o lance perfeito
        let low = 0;
        let high = budget;
        let bestBid = 0;

        for (let i = 0; i < 60; i++) {
          let mid = (low + high) / 2;
          
          let lCost = calcTax(leiloeiro, mid);
          let iCost = calcTax(itbi, mid);
          let legCost = calcTax(legal, mid);
          let cCost = cartorioMode === 'pr' ? calculateCartorioPR(mid) : calcTax(cartorioManual, mid);
          
          let simulatedTotal = mid + lCost + iCost + legCost + cCost + fixed;

          if (simulatedTotal > budget) {
            high = mid;
          } else {
            bestBid = mid;
            low = mid;
          }
        }
        
        setBidValue(Math.floor(bestBid));
        // Rola a página suavemente para o resultado
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      // --- MATH PRINCIPAL ---
      const mktVal = safeNumber(marketValue) || safeNumber(evaluationValue); // Usa Avaliação se Mercado estiver vazio
      const evalVal = safeNumber(evaluationValue);
      const bidVal = safeNumber(bidValue);

      const leiloeiroCost = calcTax(leiloeiro, bidVal);
      const itbiCost = calcTax(itbi, bidVal);
      const legalCost = calcTax(legal, bidVal);
      const cartorioCost = cartorioMode === 'pr' ? calculateCartorioPR(bidVal) : calcTax(cartorioManual, bidVal);

      const totalTaxesAndFees = leiloeiroCost + itbiCost + cartorioCost + legalCost;
      const totalFixedCosts = safeNumber(debts) + safeNumber(renovation) + safeNumber(eviction);
      
      const finalTotal = bidVal + totalTaxesAndFees + totalFixedCosts;
      const netProfit = mktVal - finalTotal;
      const roi = finalTotal > 0 ? (netProfit / finalTotal) * 100 : 0;

      const totalBudget = finalTotal > 0 ? finalTotal : 1;
      const bidPercentage = (bidVal / totalBudget) * 100;
      const taxesPercentage = (totalTaxesAndFees / totalBudget) * 100;
      const extrasPercentage = (totalFixedCosts / totalBudget) * 100;

      const getRoiStatus = (roiVal) => {
        if (netProfit < 0) return { text: "Prejuízo Estimado", color: "text-rose-600 bg-rose-50 border-rose-200" };
        if (roiVal < 15) return { text: "Margem Baixa", color: "text-amber-600 bg-amber-50 border-amber-200" };
        return { text: "Excelente Negócio", color: "text-emerald-700 bg-emerald-50 border-emerald-200" };
      };

      const roiStatus = getRoiStatus(roi);

      // Dados para extrato detalhado PR
      const emolumentoBaseReal = obterEmolumentoPR(bidVal);
      const fadepRegistroReal = (emolumentoBaseReal * 0.05);

      return (
        <div className="min-h-screen pb-20">
          
          {/* Header Personalizado */}
          <div className="bg-slate-900 text-white print-hide pt-10 pb-16 px-4">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
              <div className="text-center md:text-left">
                <div className="inline-flex items-center gap-2 bg-slate-800 border border-slate-700 px-3 py-1.5 rounded-full mb-4 shadow-sm">
                  <span className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                  <span className="text-xs font-bold tracking-widest uppercase text-slate-300">Thiago Reis - Assessoria Jurídica</span>
                </div>
                <h1 className="text-3xl sm:text-4xl font-extrabold tracking-tight mb-2">
                  Simulador de Leilões
                </h1>
                <p className="text-slate-400 font-medium text-sm">OAB/PR 115.608 • Cálculos Judiciais e Extrajudiciais</p>
              </div>
              
              <button onClick={handleReset} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-md">
                <RefreshCcw className="w-4 h-4" />
                Novo Cálculo
              </button>
            </div>
          </div>

          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 -mt-8 print:mt-4 print:max-w-none">
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
              
              {/* Coluna Esquerda: Inputs */}
              <div className="lg:col-span-5 space-y-6 print-hide">
                
                <Card title="Valores do Imóvel" icon={Building}>
                  <div className="bg-indigo-50 dark:bg-indigo-900/20 p-4 rounded-2xl border border-indigo-100 mb-6">
                    <h4 className="text-sm font-bold text-indigo-800 mb-3 flex items-center gap-2">
                      <Target className="w-4 h-4" /> Engenharia Reversa (Orçamento)
                    </h4>
                    <p className="text-[11px] text-indigo-600 mb-3">Descubra qual deve ser o seu lance para não ultrapassar seu teto de gastos no final.</p>
                    <MoneyInput label="Orçamento Máximo Desejado" value={maxBudget} onChange={setMaxBudget} placeholder="Ex: 800.000,00" />
                    <button onClick={handleSuggestBid} className="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl transition-all shadow-md text-sm mt-1">
                      Calcular Lance Ideal
                    </button>
                  </div>

                  <MoneyInput label="Valor Real de Mercado (Revenda)" value={marketValue} onChange={setMarketValue} placeholder="Ex: 600.000,00" />
                  <MoneyInput label="Valor de Avaliação (Edital)" value={evaluationValue} onChange={setEvaluationValue} placeholder="Ex: 500.000,00" />
                  
                  <div className="mt-6 pt-6 border-t border-slate-100">
                    <MoneyInput label="Valor do Lance Pretendido" value={bidValue} onChange={setBidValue} placeholder="Ex: 250.000,00" />
                    <div className="grid grid-cols-3 gap-2 mt-2">
                      <button onClick={() => setBidValue(evalVal * 1.0)} className="py-1.5 text-[11px] sm:text-xs font-bold rounded-lg border border-slate-200 bg-white text-slate-700 hover:bg-slate-50">1ª Praça (100%)</button>
                      <button onClick={() => setBidValue(Math.round(evalVal * 0.6))} className="py-1.5 text-[11px] sm:text-xs font-bold rounded-lg border border-slate-200 bg-white text-slate-700 hover:bg-slate-50">2ª Praça (60%)</button>
                      <button onClick={() => setBidValue(Math.round(evalVal * 0.5))} className="py-1.5 text-[11px] sm:text-xs font-bold rounded-lg border border-slate-200 bg-white text-slate-700 hover:bg-slate-50">Mínimo (50%)</button>
                    </div>
                  </div>
                </Card>

                <Card 
                  title="Taxas e Comissões" 
                  icon={Percent}
                  extraHeader={
                    <div className="flex bg-slate-100 p-0.5 rounded-lg border border-slate-200/50">
                      <button onClick={() => setCartorioMode('pr')} className={`px-2 py-1 text-xs font-bold rounded-md transition-all ${cartorioMode === 'pr' ? 'bg-indigo-600 text-white shadow' : 'text-slate-500 hover:text-slate-800'}`}>Auto PR</button>
                      <button onClick={() => setCartorioMode('manual')} className={`px-2 py-1 text-xs font-bold rounded-md transition-all ${cartorioMode === 'manual' ? 'bg-indigo-600 text-white shadow' : 'text-slate-500 hover:text-slate-800'}`}>Manual</button>
                    </div>
                  }
                >
                  <div className="grid grid-cols-2 gap-4">
                    <TaxInput label="Leiloeiro" value={leiloeiro.value} type={leiloeiro.type} onChangeValue={(val) => setLeiloeiro({ ...leiloeiro, value: val })} onChangeType={(t) => setLeiloeiro({ ...leiloeiro, type: t })} description="Padrão: 5%" />
                    <TaxInput label="ITBI (Imposto)" value={itbi.value} type={itbi.type} onChangeValue={(val) => setItbi({ ...itbi, value: val })} onChangeType={(t) => setItbi({ ...itbi, type: t })} description="Padrão: 2%" />
                    
                    {cartorioMode === 'pr' ? (
                      <TaxInput label="Cartório (Lei PR)" value={Math.round(cartorioCost * 100) / 100} type="fixed" disabled description="Lei 21.869-PR" />
                    ) : (
                      <TaxInput label="Registro Imóveis" value={cartorioManual.value} type={cartorioManual.type} onChangeValue={(val) => setCartorioManual({ ...cartorioManual, value: val })} onChangeType={(t) => setCartorioManual({ ...cartorioManual, type: t })} description="Custas manuais" />
                    )}
                    
                    <TaxInput label="Assessoria Jurídica" value={legal.value} type={legal.type} onChangeValue={(val) => setLegal({ ...legal, value: val })} onChangeType={(t) => setLegal({ ...legal, type: t })} description="Honorários advocatícios" />
                  </div>
                </Card>

                <Card title="Passivos e Extras (R$)" icon={Wallet}>
                  <div className="space-y-1">
                    <MoneyInput label="Dívidas Assumidas (IPTU/Condomínio)" value={debts} onChange={setDebts} />
                    <MoneyInput label="Reforma Estimada" value={renovation} onChange={setRenovation} />
                    <MoneyInput label="Custos com Desocupação" value={eviction} onChange={setEviction} />
                  </div>
                </Card>

              </div>

              {/* Coluna Direita: Dashboard */}
              <div className="lg:col-span-7 print:col-span-12 print:w-full">
                <div className="sticky top-8 space-y-6 print:space-y-4">
                  
                  {/* Card Resultado */}
                  <div className="bg-white rounded-3xl border border-slate-200/80 print-no-shadow print-tight shadow-xl overflow-hidden relative">
                    <div className="absolute top-0 inset-x-0 h-1.5 bg-gradient-to-r from-indigo-500 to-blue-500 print-hide"></div>
                    <div className="p-8 sm:p-10 print:p-4">
                      <div className="grid grid-cols-2 gap-6 items-center">
                        <div>
                          <span className="text-xs font-bold text-slate-400 uppercase tracking-wider block">Custo Total Desembolsado</span>
                          <span className="text-2xl sm:text-3xl font-extrabold text-slate-900 tracking-tight mt-1 block">{formatMoney(finalTotal)}</span>
                        </div>
                        <div className="text-right">
                          <span className="text-xs font-bold text-slate-400 uppercase tracking-wider block">Lucro Líquido Estimado</span>
                          <span className={`text-2xl sm:text-3xl font-extrabold tracking-tight mt-1 block ${netProfit >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{formatMoney(netProfit)}</span>
                        </div>
                      </div>

                      {/* Gráfico */}
                      <div className="mt-8 mb-6 print-hide">
                        <div className="flex h-3.5 w-full rounded-full overflow-hidden bg-slate-100 shadow-inner">
                          <div style={{ width: `${bidPercentage}%` }} className="bg-indigo-500 transition-all"></div>
                          <div style={{ width: `${taxesPercentage}%` }} className="bg-rose-400 transition-all"></div>
                          <div style={{ width: `${extrasPercentage}%` }} className="bg-amber-400 transition-all"></div>
                        </div>
                        <div className="flex flex-wrap text-xs font-semibold gap-4 justify-between mt-3">
                          <div className="flex items-center gap-1.5 text-slate-600"><span className="w-2.5 h-2.5 rounded-full bg-indigo-500"></span>Lance</div>
                          <div className="flex items-center gap-1.5 text-slate-600"><span className="w-2.5 h-2.5 rounded-full bg-rose-400"></span>Taxas e Impostos</div>
                          <div className="flex items-center gap-1.5 text-slate-600"><span className="w-2.5 h-2.5 rounded-full bg-amber-400"></span>Dívidas e Reformas</div>
                        </div>
                      </div>

                      <div className={`p-4 rounded-xl border flex items-center justify-between mt-4 ${roiStatus.color}`}>
                        <div className="flex items-center gap-2.5">
                          <TrendingUp className="w-5 h-5" />
                          <div>
                            <span className="text-xs opacity-80 block font-medium">Retorno Estimado (ROI)</span>
                            <span className="text-base font-bold">{formatNumber(roi)}%</span>
                          </div>
                        </div>
                        <span className="text-xs font-bold uppercase tracking-wider bg-white/50 px-2.5 py-1 rounded-md">{roiStatus.text}</span>
                      </div>
                    </div>
                  </div>

                  {/* Extrato Detalhado */}
                  <div className="bg-white rounded-3xl border border-slate-200/80 p-8 print-no-shadow print-tight">
                    
                    {/* Header exclusivo para impressão */}
                    <div className="hidden print:block mb-6 pb-4 border-b border-slate-200">
                      <h2 className="text-xl font-bold text-slate-900">Relatório de Viabilidade de Leilão</h2>
                      <p className="text-sm text-slate-600">Thiago Reis - Assessoria Jurídica | OAB/PR 115.608</p>
                    </div>

                    <h4 className="text-base font-bold text-slate-800 mb-5 flex items-center gap-2 print:mb-3">
                      <CheckCircle className="w-5 h-5 text-indigo-500" /> Extrato Financeiro Consolidado
                    </h4>
                    
                    <ul className="space-y-3 text-sm">
                      <li className="flex justify-between items-center text-slate-600 bg-slate-50 p-2 rounded-lg">
                        <span>Valor de Mercado (Referência)</span>
                        <span className="font-bold text-slate-900">{formatMoney(mktVal)}</span>
                      </li>
                      <li className="flex justify-between items-center text-slate-600 bg-slate-50 p-2 rounded-lg mb-4">
                        <span>Valor de Avaliação (Edital)</span>
                        <span className="font-bold text-slate-900">{formatMoney(evalVal)}</span>
                      </li>

                      <li className="flex justify-between items-center pb-2 border-b border-slate-100">
                        <span className="font-semibold text-slate-800">Valor Arrematado (Lance)</span>
                        <span className="font-bold text-slate-900">{formatMoney(bidVal)}</span>
                      </li>
                      <li className="flex justify-between items-center text-slate-600">
                        <span>Comissão Leiloeiro</span>
                        <span className="font-medium text-rose-500">+{formatMoney(leiloeiroCost)}</span>
                      </li>
                      <li className="flex justify-between items-center text-slate-600">
                        <span>ITBI (Imposto)</span>
                        <span className="font-medium text-rose-500">+{formatMoney(itbiCost)}</span>
                      </li>
                      
                      {/* Sessão Cartório */}
                      {cartorioMode === 'pr' ? (
                        <li className="bg-slate-50 p-3 rounded-xl border border-slate-100 space-y-1 block my-2">
                          <div className="flex justify-between text-xs font-bold text-slate-700">
                            <span>Registro de Imóveis (Regras TJ/PR)</span>
                            <span className="text-rose-500">+{formatMoney(cartorioCost)}</span>
                          </div>
                          <div className="grid grid-cols-2 gap-x-4 gap-y-0.5 text-[10px] text-slate-500 pl-2 mt-1">
                            <div>• Emolumento Base: {formatMoney(emolumentoBaseReal)}</div>
                            <div>• FADEP (5%): {formatMoney(fadepRegistroReal)}</div>
                            <div>• Funrejus (0.2% Teto): {formatMoney(bidVal > 0 ? (bidVal * 0.002 > 7408.87 ? 7408.87 : bidVal * 0.002) : 0)}</div>
                            <div>• Selos, Prenotação e ISS incluso no total.</div>
                          </div>
                        </li>
                      ) : (
                        <li className="flex justify-between items-center text-slate-600">
                          <span>Custas Cartório / Registro</span>
                          <span className="font-medium text-rose-500">+{formatMoney(cartorioCost)}</span>
                        </li>
                      )}

                      <li className="flex justify-between items-center text-slate-600">
                        <span>Assessoria Jurídica</span>
                        <span className="font-medium text-rose-500">+{formatMoney(legalCost)}</span>
                      </li>
                      <li className="flex justify-between items-center text-slate-600">
                        <span>Dívidas Assumidas (Cond./IPTU)</span>
                        <span className="font-medium text-amber-500">+{formatMoney(safeNumber(debts))}</span>
                      </li>
                      <li className="flex justify-between items-center text-slate-600">
                        <span>Reformas e Benfeitorias</span>
                        <span className="font-medium text-amber-500">+{formatMoney(safeNumber(renovation))}</span>
                      </li>
                      <li className="flex justify-between items-center text-slate-600 pb-3 border-b border-slate-100">
                        <span>Desocupação Judicial/Extrajudicial</span>
                        <span className="font-medium text-amber-500">+{formatMoney(safeNumber(eviction))}</span>
                      </li>
                      
                      <li className="flex justify-between items-center pt-2">
                        <span className="font-bold text-slate-800">Total a Desembolsar</span>
                        <span className="font-extrabold text-xl text-indigo-700">{formatMoney(finalTotal)}</span>
                      </li>
                    </ul>

                    {/* Disclaimer de Estimativa */}
                    <div className="mt-8 pt-4 border-t border-slate-100 text-[10px] text-slate-400 text-justify leading-relaxed">
                      <strong>Aviso Legal:</strong> Este relatório é uma simulação estimativa para auxiliar na tomada de decisão em leilões de imóveis. Os valores exatos de impostos, taxas judiciais, honorários, reformas e emolumentos cartorários (mesmo os baseados na legislação vigente) podem sofrer variações ou alterações de acordo com interpretações municipais, estaduais e peculiaridades de cada edital ou imóvel. Consulte sempre um advogado especialista e o respectivo edital antes de efetuar lances.
                    </div>

                    <button 
                      onClick={() => window.print()} 
                      className="mt-6 w-full flex items-center justify-center gap-2 py-3 px-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl transition-all shadow-md print-hide"
                    >
                      <Printer className="w-4 h-4" />
                      Imprimir / Gerar PDF
                    </button>
                  </div>

                </div>
              </div>
              
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
