<!DOCTYPE html>
<html lang="pt-BR" class="antialiased h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central de Cálculos Imobiliários - Dr. Thiago Reis</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- React & ReactDOM (Versão 18) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel para compilação do JSX no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .theme-transition { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease; }

    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; color: black !important; }
      .print-hide { display: none !important; }
      .print-no-shadow { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
      .print-tight { padding: 1.5rem !important; margin: 0 !important; }
      .print-text-dark { color: #0f172a !important; }
      .print-border-grey { border-color: #cbd5e1 !important; }
      .print-page-break { page-break-inside: avoid; }
    }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 theme-transition h-full font-sans">
  <div id="root" class="min-h-full"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Ícones SVG
    const Building = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2Z"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2Z"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>;
    const Percent = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>;
    const Wallet = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3v1a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9"/></svg>;
    const TrendingUp = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
    const CheckCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const Printer = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
    const Target = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
    const RefreshCcw = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>;
    const FileText = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>;
    const Scale = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>;
    const Sun = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
    const Moon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;

    // Helpers
    const formatMoney = (value) => {
      if (value === '' || value === undefined || value === null) return 'R$ 0,00';
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
    };

    const formatNumber = (value) => {
      if (value === '' || value === undefined || value === null) return '0';
      return new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 2 }).format(value);
    };

    const safeNumber = (val) => (val === '' ? 0 : Number(val));

    // Valor de teto da Taxa Judiciária (Funrejus - PR) 53 UPF/PR
    const tetoFunrejus = 53 * 139.79; // R$ 7.408,87

    const obterEmolumentoPR = (valor) => {
      if (valor <= 56000) return 349.02;
      if (valor <= 66000) return 411.34;
      if (valor <= 76000) return 473.67;
      if (valor <= 86000) return 535.99;
      if (valor <= 96000) return 598.32;
      if (valor <= 106000) return 660.64;
      if (valor <= 116000) return 722.97;
      if (valor <= 126000) return 785.29;
      if (valor <= 136000) return 847.62;
      if (valor <= 146000) return 909.94;
      if (valor <= 156000) return 972.27;
      if (valor <= 166000) return 1011.60;
      if (valor <= 176000) return 1072.54;
      if (valor <= 186000) return 1133.48;
      if (valor <= 196000) return 1194.42;
      if (valor <= 206000) return 1255.36;
      if (valor <= 216000) return 1316.30;
      return 1377.24; 
    };

    const calcTax = (taxState, baseValue) => {
      const val = safeNumber(taxState.value);
      if (taxState.type === 'percent') return baseValue * (val / 100);
      return val;
    };

    const MoneyInput = ({ label, value, onChange, placeholder, disabled, hint }) => (
      <div className="mb-4">
        <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5 flex justify-between items-center">
          {label}
          {hint && <span className="text-[10px] bg-indigo-50 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400 px-2 py-0.5 rounded font-bold uppercase tracking-wider">{hint}</span>}
        </label>
        <div className="relative rounded-xl shadow-sm">
          <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <span className="text-slate-400 dark:text-slate-500 font-medium sm:text-sm">R$</span>
          </div>
          <input
            type="number" min="0" disabled={disabled}
            value={value === '' ? '' : value}
            onChange={(e) => onChange(e.target.value === '' ? '' : Number(e.target.value))}
            className="block w-full pl-10 pr-4 py-2.5 sm:text-sm font-semibold border border-slate-200 dark:border-slate-800 rounded-xl bg-slate-50/50 dark:bg-slate-900/50 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all focus:bg-white dark:focus:bg-slate-900 disabled:opacity-50"
            placeholder={placeholder || "0,00"}
          />
        </div>
        <div className="text-xs text-slate-400 dark:text-slate-500 mt-1.5 ml-1 font-medium h-4">
           {value !== '' && formatMoney(value)}
        </div>
      </div>
    );

    const TaxInput = ({ label, value, onChangeValue, type, onChangeType, description, disabled }) => (
      <div className="mb-4">
        <div className="flex justify-between items-end mb-1.5">
          <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300">{label}</label>
          {!disabled && (
            <div className="flex bg-slate-200 dark:bg-slate-800 rounded-lg p-0.5">
              <button type="button" onClick={() => onChangeType('percent')} className={`px-2 py-0.5 text-[10px] uppercase font-bold rounded-md transition-colors ${type === 'percent' ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-white'}`}>%</button>
              <button type="button" onClick={() => onChangeType('fixed')} className={`px-2 py-0.5 text-[10px] uppercase font-bold rounded-md transition-colors ${type === 'fixed' ? 'bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-white'}`}>R$</button>
            </div>
          )}
        </div>
        <div className="relative rounded-xl shadow-sm">
          {(type === 'fixed' || disabled) && (
            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span className="text-slate-400 dark:text-slate-500 font-medium sm:text-sm">R$</span></div>
          )}
          <input
            type="number" min="0" disabled={disabled} step={type === 'percent' ? "0.1" : "1"}
            value={value === '' ? '' : value}
            onChange={(e) => onChangeValue(e.target.value === '' ? '' : Number(e.target.value))}
            className={`block w-full ${(type === 'fixed' || disabled) ? 'pl-10 pr-4' : 'pl-4 pr-10'} py-2.5 sm:text-sm font-medium border border-slate-200 dark:border-slate-800 rounded-xl bg-slate-50/50 dark:bg-slate-900/50 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all disabled:opacity-75 focus:bg-white dark:focus:bg-slate-900`}
            placeholder="0"
          />
          {type === 'percent' && !disabled && (
            <div className="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none"><span className="text-slate-400 dark:text-slate-500 font-medium sm:text-sm">%</span></div>
          )}
        </div>
        <div className="flex justify-between items-center mt-1.5 ml-1 h-4">
          {description && <div className="text-[11px] text-slate-400 dark:text-slate-500">{description}</div>}
          {(type === 'fixed' || disabled) && value !== '' && <div className="text-[11px] text-slate-400 dark:text-slate-500 font-medium">{formatMoney(value)}</div>}
        </div>
      </div>
    );

    const Card = ({ title, icon: Icon, children, extraHeader }) => (
      <div className="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200/70 dark:border-slate-800/80 shadow-sm p-6 relative print-no-shadow print-tight transition-all">
        <div className="flex justify-between items-center mb-5">
          <h3 className="text-base font-bold text-slate-800 dark:text-slate-200 flex items-center gap-2">
            {Icon && <Icon className="w-5 h-5 text-indigo-600 dark:text-indigo-400" />} {title}
          </h3>
          {extraHeader}
        </div>
        {children}
      </div>
    );

    const AuctionTab = ({ data, updateData }) => {
      const calculateCartorioPR = (valorLance) => {
        const emolumentoBase = obterEmolumentoPR(valorLance);
        const fadepRegistro = (emolumentoBase * 0.05);
        const seloRegistro = 8.00;
        const subtotalPrenotacao = 3.85; 
        const subtotalArquivamento = 2.78;
        const funrejusCalculado = valorLance * 0.002;
        const funrejusFinal = funrejusCalculado > tetoFunrejus ? tetoFunrejus : funrejusCalculado;
        const issFinal = (emolumentoBase + 2.77 + 1.94) * 0.03;
        return emolumentoBase + fadepRegistro + seloRegistro + subtotalPrenotacao + subtotalArquivamento + funrejusFinal + issFinal;
      };

      const handleSuggestBid = () => {
        const budget = safeNumber(data.maxBudget);
        const fixed = safeNumber(data.debts) + safeNumber(data.renovation) + safeNumber(data.eviction);
        
        if (budget <= fixed) {
          alert("O orçamento máximo precisa ser maior que a soma das dívidas, reformas e custos de desocupação.");
          return;
        }

        let low = 0, high = budget, bestBid = 0;
        for (let i = 0; i < 60; i++) {
          let mid = (low + high) / 2;
          let lCost = calcTax(data.leiloeiro, mid);
          let iCost = calcTax(data.itbi, mid);
          let legCost = calcTax(data.legal, mid);
          let cCost = data.cartorioMode === 'pr' ? calculateCartorioPR(mid) : calcTax(data.cartorioManual, mid);
          
          let simulatedTotal = mid + lCost + iCost + legCost + cCost + fixed;

          if (simulatedTotal > budget) { high = mid; } else { bestBid = mid; low = mid; }
        }
        updateData('bidValue', Math.floor(bestBid));
      };

      const mktVal = safeNumber(data.marketValue) || safeNumber(data.evaluationValue);
      const evalVal = safeNumber(data.evaluationValue);
      const bidVal = safeNumber(data.bidValue);

      const leiloeiroCost = calcTax(data.leiloeiro, bidVal);
      const itbiCost = calcTax(data.itbi, bidVal);
      const legalCost = calcTax(data.legal, bidVal);
      const cartorioCost = data.cartorioMode === 'pr' ? calculateCartorioPR(bidVal) : calcTax(data.cartorioManual, bidVal);

      const totalTaxesAndFees = leiloeiroCost + itbiCost + cartorioCost + legalCost;
      const totalFixedCosts = safeNumber(data.debts) + safeNumber(data.renovation) + safeNumber(data.eviction);
      const finalTotal = bidVal + totalTaxesAndFees + totalFixedCosts;
      
      const netProfit = mktVal - finalTotal;
      const roi = finalTotal > 0 ? (netProfit / finalTotal) * 100 : 0;
      
      const roiStatus = netProfit < 0 ? 
        { text: "Prejuízo Estimado", color: "text-rose-600 bg-rose-50 dark:bg-rose-950/40 border-rose-200 dark:border-rose-900" } : 
        roi < 15 ? 
        { text: "Margem Baixa", color: "text-amber-600 bg-amber-50 dark:bg-amber-950/40 border-amber-200 dark:border-amber-900" } : 
        { text: "Excelente", color: "text-emerald-700 bg-emerald-50 dark:bg-emerald-950/40 border-emerald-200 dark:border-emerald-900" };

      const emolumentoBaseReal = obterEmolumentoPR(bidVal);
      const fadepRegistroReal = (emolumentoBaseReal * 0.05);

      return (
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 print-tight">
          <div className="lg:col-span-5 space-y-6 print-hide">
            <Card title="Valores do Imóvel" icon={Building}>
              <div className="bg-indigo-50/50 dark:bg-indigo-950/30 p-4 rounded-2xl border border-indigo-100 dark:border-indigo-900/50 mb-6">
                <h4 className="text-xs font-bold text-indigo-800 dark:text-indigo-400 mb-2 flex items-center gap-1.5"><Target className="w-4 h-4"/> Engenharia Reversa (Orçamento)</h4>
                <p className="text-[11px] text-slate-500 dark:text-slate-400 mb-3 leading-relaxed">Descubra o valor máximo de lance para atingir seu teto total planejado.</p>
                <MoneyInput label="Orçamento Limite (Total)" value={data.maxBudget} onChange={(v) => updateData('maxBudget', v)} />
                <button onClick={handleSuggestBid} className="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl shadow transition-all">Calcular Lance Ideal</button>
              </div>

              <MoneyInput label="Valor Real de Mercado (Referência)" value={data.marketValue} onChange={(v) => updateData('marketValue', v)} />
              <MoneyInput label="Avaliação (Edital)" value={data.evaluationValue} onChange={(v) => updateData('evaluationValue', v)} />
              
              <div className="mt-4 pt-4 border-t border-slate-100 dark:border-slate-800">
                <MoneyInput label="Lance Pretendido" value={data.bidValue} onChange={(v) => updateData('bidValue', v)} />
                <div className="grid grid-cols-3 gap-2 mt-2">
                  <button onClick={() => updateData('bidValue', evalVal)} className="py-1 text-xs border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">1ª Praça</button>
                  <button onClick={() => updateData('bidValue', Math.round(evalVal * 0.6))} className="py-1 text-xs border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">60%</button>
                  <button onClick={() => updateData('bidValue', Math.round(evalVal * 0.5))} className="py-1 text-xs border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">50%</button>
                </div>
              </div>
            </Card>

            <Card title="Taxas e Comissões" icon={Percent} extraHeader={
                <div className="flex bg-slate-100 dark:bg-slate-800 p-0.5 rounded-lg border border-slate-200/50 dark:border-slate-700">
                  <button onClick={() => updateData('cartorioMode', 'pr')} className={`px-2.5 py-1 text-[10px] font-bold rounded ${data.cartorioMode === 'pr' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-500 dark:text-slate-400'}`}>TJ-PR</button>
                  <button onClick={() => updateData('cartorioMode', 'manual')} className={`px-2.5 py-1 text-[10px] font-bold rounded ${data.cartorioMode === 'manual' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-500 dark:text-slate-400'}`}>Manual</button>
                </div>
              }>
              <div className="grid grid-cols-2 gap-4">
                <TaxInput label="Leiloeiro" value={data.leiloeiro.value} type={data.leiloeiro.type} onChangeValue={(v) => updateData('leiloeiro', {...data.leiloeiro, value: v})} onChangeType={(t) => updateData('leiloeiro', {...data.leiloeiro, type: t})} />
                <TaxInput label="ITBI" value={data.itbi.value} type={data.itbi.type} onChangeValue={(v) => updateData('itbi', {...data.itbi, value: v})} onChangeType={(t) => updateData('itbi', {...data.itbi, type: t})} />
                {data.cartorioMode === 'pr' ? (
                  <TaxInput label="Cartório PR" value={Math.round(cartorioCost*100)/100} type="fixed" disabled />
                ) : (
                  <TaxInput label="Cartório" value={data.cartorioManual.value} type={data.cartorioManual.type} onChangeValue={(v) => updateData('cartorioManual', {...data.cartorioManual, value: v})} onChangeType={(t) => updateData('cartorioManual', {...data.cartorioManual, type: t})} />
                )}
                <TaxInput label="Assessoria Jurídica" value={data.legal.value} type={data.legal.type} onChangeValue={(v) => updateData('legal', {...data.legal, value: v})} onChangeType={(t) => updateData('legal', {...data.legal, type: t})} />
              </div>
            </Card>

            <Card title="Extras / Passivos" icon={Wallet}>
              <div className="space-y-1">
                <MoneyInput label="Dívidas Cond./IPTU" value={data.debts} onChange={(v) => updateData('debts', v)} />
                <MoneyInput label="Reformas" value={data.renovation} onChange={(v) => updateData('renovation', v)} />
                <MoneyInput label="Desocupação" value={data.eviction} onChange={(v) => updateData('eviction', v)} />
              </div>
            </Card>
          </div>

          <div className="lg:col-span-7 print:col-span-12">
            <div className="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 p-8 print-no-shadow print-tight shadow-lg sticky top-8 theme-transition">
               <div className="hidden print:block border-b print-border-grey pb-4 mb-6">
                 <h2 className="text-xl font-bold print-text-dark">Relatório de Viabilidade e Custas de Arrematação</h2>
                 <p className="text-xs text-slate-500 mt-1">Thiago Reis - Assessoria Jurídica | OAB/PR 115.608</p>
               </div>
               
               <div className="grid grid-cols-2 gap-4 mb-6">
                 <div>
                   <span className="text-xs text-slate-400 dark:text-slate-500 block uppercase font-bold tracking-wider">Investimento Total</span>
                   <span className="text-2xl sm:text-3xl font-black text-slate-900 dark:text-white mt-1 block print-text-dark">{formatMoney(finalTotal)}</span>
                 </div>
                 <div className="text-right">
                   <span className="text-xs text-slate-400 dark:text-slate-500 block uppercase font-bold tracking-wider">Lucro Estimado</span>
                   <span className={`text-2xl sm:text-3xl font-black mt-1 block ${netProfit >= 0 ? 'text-emerald-500' : 'text-rose-500'}`}>{formatMoney(netProfit)}</span>
                 </div>
               </div>

               <div className="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-100 dark:border-slate-800 mb-6 flex justify-between items-center print-hide">
                 <div className="flex gap-3 items-center">
                   <TrendingUp className="w-5 h-5 text-indigo-500"/>
                   <div><span className="block text-xs text-slate-500 dark:text-slate-400 font-medium">ROI Estimado</span><span className="font-bold text-slate-900 dark:text-white">{formatNumber(roi)}%</span></div>
                 </div>
                 <span className={`px-2.5 py-1 text-xs font-bold rounded uppercase border ${roiStatus.color}`}>{roiStatus.text}</span>
               </div>

               <h4 className="text-sm font-bold text-slate-800 dark:text-slate-200 mb-4 print-text-dark">Detalhamento Financeiro</h4>
               <ul className="space-y-3.5 text-sm print-text-dark">
                 <li className="flex justify-between bg-slate-50 dark:bg-slate-800/40 p-2.5 rounded-lg border border-slate-100 dark:border-slate-800/50">
                   <span className="text-slate-600 dark:text-slate-400">Valor de Mercado</span><span className="font-bold text-slate-900 dark:text-white print-text-dark">{formatMoney(mktVal)}</span>
                 </li>
                 <li className="flex justify-between items-center pb-2 border-b border-slate-100 dark:border-slate-800/50">
                   <span className="font-semibold text-slate-700 dark:text-slate-300">Valor do Lance</span><span className="font-bold text-slate-900 dark:text-white print-text-dark">{formatMoney(bidVal)}</span>
                 </li>
                 <li className="flex justify-between text-slate-600 dark:text-slate-400"><span>Comissão Leiloeiro</span><span className="text-rose-500 font-semibold">+{formatMoney(leiloeiroCost)}</span></li>
                 <li className="flex justify-between text-slate-600 dark:text-slate-400"><span>Imposto ITBI</span><span className="text-rose-500 font-semibold">+{formatMoney(itbiCost)}</span></li>
                 
                 {data.cartorioMode === 'pr' ? (
                   <li className="bg-slate-50 dark:bg-slate-800/40 p-3.5 rounded-xl border border-slate-100 dark:border-slate-800 space-y-1.5 block my-2">
                     <div className="flex justify-between text-xs font-bold text-slate-700 dark:text-slate-300 print-text-dark">
                       <span>Registro de Imóveis (TJ/PR)</span><span className="text-rose-500 font-bold">+{formatMoney(cartorioCost)}</span>
                     </div>
                     <div className="grid grid-cols-2 gap-x-4 gap-y-1 text-[11px] text-slate-500 dark:text-slate-400 pl-2 mt-1">
                       <div>• Emolumento: {formatMoney(emolumentoBaseReal)}</div>
                       <div>• FADEP (5%): {formatMoney(fadepRegistroReal)}</div>
                       <div>• Funrejus (Teto): {formatMoney(bidVal > 0 ? (bidVal * 0.002 > tetoFunrejus ? tetoFunrejus : bidVal * 0.002) : 0)}</div>
                       <div>• Selo, Prenotação, Arquivamento e ISS.</div>
                     </div>
                   </li>
                 ) : (
                   <li className="flex justify-between text-slate-600 dark:text-slate-400"><span>Cartório / Registro</span><span className="text-rose-500 font-semibold">+{formatMoney(cartorioCost)}</span></li>
                 )}

                 <li className="flex justify-between text-slate-600 dark:text-slate-400"><span>Assessoria Jurídica</span><span className="text-rose-500 font-semibold">+{formatMoney(legalCost)}</span></li>
                 <li className="flex justify-between text-slate-600 dark:text-slate-400"><span>Dívidas de Condomínio / IPTU</span><span className="text-amber-500 font-semibold">+{formatMoney(safeNumber(data.debts))}</span></li>
                 <li className="flex justify-between text-slate-600 dark:text-slate-400"><span>Custos de Reforma e Desocupação</span><span className="text-amber-500 font-semibold">+{formatMoney(safeNumber(data.renovation) + safeNumber(data.eviction))}</span></li>
                 
                 <li className="flex justify-between pt-4 border-t border-slate-200 dark:border-slate-700 mt-3">
                   <span className="font-bold text-slate-800 dark:text-slate-200 print-text-dark">Total Geral a Desembolsar</span><span className="font-black text-indigo-700 dark:text-indigo-400 text-lg print-text-dark">{formatMoney(finalTotal)}</span>
                 </li>
               </ul>

               <div className="mt-8 pt-4 border-t border-slate-100 dark:border-slate-800 text-[10px] text-slate-400 dark:text-slate-500 text-justify leading-relaxed">
                 <strong>Aviso de Estimativa:</strong> Os valores exibidos neste demonstrativo são projeções aproximadas para suporte analítico. Os emolumentos, impostos estaduais e municipais, e demais despesas incidentes podem variar dependendo da circunscrição imobiliária, certidões adicionais exigidas e atualizações normativas na tabela do Tribunal de Justiça do Estado do Paraná.
               </div>

               <div className="hidden print:flex mt-12 pt-8 border-t print-border-grey justify-between items-center text-xs">
                 <div>
                   <p className="font-bold">____________________________________________</p>
                   <p className="text-slate-500 mt-1">Dr. Thiago Reis - OAB/PR 115.608</p>
                 </div>
                 <div className="text-right">
                   <p className="font-bold">____________________________________________</p>
                   <p className="text-slate-500 mt-1">Assinatura do Cliente</p>
                 </div>
               </div>

               <button onClick={() => window.print()} className="w-full mt-6 py-3 bg-slate-900 hover:bg-slate-800 dark:bg-white dark:hover:bg-slate-100 text-white dark:text-slate-900 font-bold rounded-xl shadow-md print-hide flex items-center justify-center gap-2 transition-all"><Printer className="w-4 h-4"/> Imprimir Demonstrativo</button>
            </div>
          </div>
        </div>
      );
    };

    const DeedTab = ({ data, updateData }) => {
      const valor = safeNumber(data.deedValue);
      const emolumentoBase = obterEmolumentoPR(valor); 
      const funrejus = valor > 0 ? (valor * 0.002 > tetoFunrejus ? tetoFunrejus : valor * 0.002) : 0;
      
      const fadepEscritura = emolumentoBase * 0.05;
      const seloEscritura = 8.00;
      const issEscritura = emolumentoBase * 0.03;
      const custoEscrituraAuto = emolumentoBase + fadepEscritura + seloEscritura + issEscritura;

      const fadepRegistro = emolumentoBase * 0.05;
      const seloRegistro = 8.00;
      const subtotalPrenotacao = 3.85; 
      const subtotalArquivamento = 2.78;
      const issRegistro = (emolumentoBase + 2.77 + 1.94) * 0.03;
      const custoRegistroAuto = emolumentoBase + fadepRegistro + seloRegistro + subtotalPrenotacao + subtotalArquivamento + funrejus + issRegistro;

      const custoItbi = valor * (safeNumber(data.deedItbi) / 100);
      const custoCertidoes = safeNumber(data.deedCertidoes);

      const valEscritura = data.deedMode === 'pr' ? custoEscrituraAuto : safeNumber(data.deedManualEscritura);
      const valRegistro = data.deedMode === 'pr' ? custoRegistroAuto : safeNumber(data.deedManualRegistro);
      
      const subtotalNotarial = valEscritura + custoCertidoes + (data.deedMode === 'manual' ? funrejus : 0);
      const totalGeral = subtotalNotarial + valRegistro + custoItbi;

      return (
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 print-tight">
          <div className="lg:col-span-5 space-y-6 print-hide">
            <Card title="Dados da Compra e Venda" icon={FileText}>
              <MoneyInput label="Valor do Negócio (Contrato/Base)" value={data.deedValue} onChange={(v) => updateData('deedValue', v)} />
              
              <div className="mt-4 mb-6">
                 <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Tabela de Emolumentos</label>
                 <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-lg border border-slate-200/50 dark:border-slate-700">
                    <button onClick={() => updateData('deedMode', 'pr')} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-all ${data.deedMode === 'pr' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-white'}`}>Auto TJ-PR</button>
                    <button onClick={() => updateData('deedMode', 'manual')} className={`flex-1 py-1.5 text-xs font-bold rounded-md transition-all ${data.deedMode === 'manual' ? 'bg-indigo-600 text-white shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-white'}`}>Manual</button>
                 </div>
              </div>

              <div className="space-y-4">
                 <div>
                    <label className="block text-xs font-semibold text-slate-600 dark:text-slate-400 mb-1">Alíquota ITBI (%)</label>
                    <input type="number" step="0.1" value={data.deedItbi} onChange={(e) => updateData('deedItbi', Number(e.target.value))} className="w-full p-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white dark:focus:bg-slate-900 transition-all" />
                 </div>
                 <MoneyInput label="Certidões e Emissões Extras" value={data.deedCertidoes} onChange={(v) => updateData('deedCertidoes', v)} />
                 
                 {data.deedMode === 'manual' && (
                   <div className="pt-4 border-t border-slate-100 dark:border-slate-800 grid grid-cols-2 gap-4">
                      <MoneyInput label="Custo Escritura" value={data.deedManualEscritura} onChange={(v) => updateData('deedManualEscritura', v)} />
                      <MoneyInput label="Custo Registro" value={data.deedManualRegistro} onChange={(v) => updateData('deedManualRegistro', v)} />
                   </div>
                 )}
              </div>
            </Card>
          </div>

          <div className="lg:col-span-7 print:col-span-12">
             <div className="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 p-8 shadow-lg sticky top-8 theme-transition print-no-shadow print-tight">
                <div className="hidden print:block border-b print-border-grey pb-4 mb-6">
                  <h2 className="text-xl font-bold print-text-dark">Previsão Legal: Escritura Pública e Registro de Imóveis</h2>
                  <p className="text-xs text-slate-500 mt-1">Thiago Reis - Assessoria Jurídica | OAB/PR 115.608</p>
                </div>
                
                <h4 className="text-sm font-bold text-slate-800 dark:text-slate-200 mb-5 flex items-center gap-2 print-text-dark"><Scale className="w-5 h-5 text-indigo-500" /> Demonstrativo de Transmissão</h4>
                
                <div className="space-y-4 text-sm print-text-dark">
                    <div className="flex justify-between pb-3 border-b border-slate-100 dark:border-slate-800">
                      <span className="font-semibold text-slate-600 dark:text-slate-300">Valor do Imóvel / Negócio</span>
                      <span className="font-bold text-base text-slate-900 dark:text-white print-text-dark">{formatMoney(valor)}</span>
                    </div>

                    <div className="pt-2">
                        <h5 className="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 uppercase mb-3 tracking-wider">Passo 1: Impostos e Tabelionato</h5>
                        <div className="space-y-2 pl-3 border-l-2 border-indigo-100 dark:border-indigo-900/50">
                            <div className="flex justify-between text-slate-600 dark:text-slate-400"><span>Imposto de Transmissão (ITBI {data.deedItbi}%)</span><span className="font-medium text-slate-900 dark:text-white print-text-dark">{formatMoney(custoItbi)}</span></div>
                            <div className="flex justify-between text-slate-600 dark:text-slate-400"><span>Custos com Certidões e Diligências</span><span className="font-medium text-slate-900 dark:text-white print-text-dark">{formatMoney(custoCertidoes)}</span></div>
                            <div className="flex justify-between text-slate-600 dark:text-slate-400"><span>Lavratura da Escritura Pública (Notas)</span><span className="font-medium text-slate-900 dark:text-white print-text-dark">{formatMoney(valEscritura)}</span></div>
                            {data.deedMode === 'manual' && <div className="flex justify-between text-slate-600 dark:text-slate-400"><span>Taxa Judiciária (Funrejus)</span><span className="font-medium text-slate-900 dark:text-white print-text-dark">{formatMoney(funrejus)}</span></div>}
                        </div>
                    </div>

                    <div className="pt-4">
                        <h5 className="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 uppercase mb-3 tracking-wider">Passo 2: Registro de Imóveis (RGI)</h5>
                        <div className="space-y-2 pl-3 border-l-2 border-indigo-100 dark:border-indigo-900/50">
                            <div className="flex justify-between text-slate-600 dark:text-slate-400"><span className="font-medium">Registro na Matrícula</span><span className="font-bold text-slate-900 dark:text-white print-text-dark">{formatMoney(valRegistro)}</span></div>
                            {data.deedMode === 'pr' && (
                               <div className="text-[10px] text-slate-500 dark:text-slate-400 space-y-0.5 mt-2 bg-slate-50 dark:bg-slate-800/50 p-2 rounded print-no-shadow print-tight">
                                   <p>• Emolumentos + Taxas RGI: {formatMoney(emolumentoBase + fadepRegistro + seloRegistro + subtotalPrenotacao + subtotalArquivamento + issRegistro)}</p>
                                   <p>• Funrejus (Teto PR): <span className="font-semibold">{formatMoney(funrejus)}</span></p>
                               </div>
                            )}
                        </div>
                    </div>

                    <div className="flex justify-between items-center pt-6 border-t border-slate-200 dark:border-slate-700 mt-4">
                        <span className="font-extrabold text-base text-slate-800 dark:text-slate-200 print-text-dark">Total Geral de Transmissão</span>
                        <span className="font-black text-2xl text-indigo-700 dark:text-indigo-400 print-text-dark">{formatMoney(totalGeral)}</span>
                    </div>
                </div>

                <div className="mt-8 pt-4 border-t border-slate-100 dark:border-slate-800 text-[10px] text-slate-400 dark:text-slate-500 text-justify leading-relaxed">
                  <strong>Aviso de Estimativa:</strong> Os custos com lavratura de escritura pública e registro imobiliário exibidos neste demonstrativo são baseados no regimento de custas do Estado do Paraná (Lei nº 21.869/2023). Variações podem ocorrer de acordo com o número de proprietários, averbações adicionais na matrícula ou cobranças locais de ISS municipal.
                </div>

                <div className="hidden print:flex mt-12 pt-8 border-t print-border-grey justify-between items-center text-xs">
                  <div>
                    <p className="font-bold">____________________________________________</p>
                    <p className="text-slate-500 mt-1">Dr. Thiago Reis - OAB/PR 115.608</p>
                  </div>
                  <div className="text-right">
                    <p className="font-bold">____________________________________________</p>
                    <p className="text-slate-500 mt-1">Assinatura do Cliente</p>
                  </div>
                </div>

                <button onClick={() => window.print()} className="w-full mt-6 py-3 bg-slate-900 hover:bg-slate-800 dark:bg-white dark:hover:bg-slate-100 text-white dark:text-slate-900 font-bold rounded-xl shadow-md print-hide flex items-center justify-center gap-2 transition-all"><Printer className="w-4 h-4"/> Imprimir Demonstrativo</button>
             </div>
          </div>
        </div>
      );
    };

    function App() {
      const initData = {
        marketValue: '', evaluationValue: '', bidValue: '', maxBudget: '', cartorioMode: 'pr', 
        leiloeiro: { value: 5, type: 'percent' }, itbi: { value: 2, type: 'percent' }, 
        cartorioManual: { value: 2, type: 'percent' }, legal: { value: 5, type: 'percent' }, 
        debts: '', renovation: '', eviction: '',
        deedValue: '', deedItbi: 2, deedCertidoes: 300, deedMode: 'pr', deedManualEscritura: 1600, deedManualRegistro: 1600
      };

      const [data, setData] = useState(() => {
        try {
          const saved = localStorage.getItem('calc_imob_thiago_completa');
          if (saved) return { ...initData, ...JSON.parse(saved) };
        } catch (e) {}
        return initData;
      });

      const [activeTab, setActiveTab] = useState('leilao');
      const [isDarkMode, setIsDarkMode] = useState(() => {
        try {
          return localStorage.getItem('theme_preference') === 'dark';
        } catch (e) { return false; }
      });

      useEffect(() => { 
        try { localStorage.setItem('calc_imob_thiago_completa', JSON.stringify(data)); } catch(e){}
      }, [data]);

      useEffect(() => {
        const root = window.document.documentElement;
        if (isDarkMode) {
          root.classList.add('dark');
          try { localStorage.setItem('theme_preference', 'dark'); } catch(e){}
        } else {
          root.classList.remove('dark');
          try { localStorage.setItem('theme_preference', 'light'); } catch(e){}
        }
      }, [isDarkMode]);

      const updateData = (key, value) => setData(prev => ({ ...prev, [key]: value }));

      const handleReset = () => {
        if(window.confirm("Iniciar uma nova simulação? Todos os valores de dinheiro serão limpos.")) {
          setData(prev => ({ 
            ...prev, 
            marketValue: '', evaluationValue: '', bidValue: '', maxBudget: '', 
            debts: '', renovation: '', eviction: '', deedValue: '' 
          }));
        }
      };

      return (
        <div className="min-h-screen pb-20 selection:bg-indigo-200 dark:selection:bg-indigo-900">
          
          <div className="bg-slate-900 text-white print-hide pt-10 px-4 shadow-md">
            <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
              <div className="text-center md:text-left">
                <div className="inline-flex items-center gap-2 bg-slate-800 border border-slate-700 px-3.5 py-1.5 rounded-full mb-4 shadow-sm">
                  <span className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                  <span className="text-xs font-bold tracking-widest uppercase text-slate-300">Thiago Reis - Assessoria Jurídica</span>
                </div>
                <h1 className="text-3xl sm:text-4xl font-extrabold tracking-tight mb-2">Central de Cálculos</h1>
                <p className="text-slate-400 font-medium text-sm">OAB/PR 115.608 • Inteligência em Imóveis e Leilões</p>
              </div>
              
              <div className="flex items-center gap-4">
                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white rounded-xl shadow transition-all flex items-center justify-center" title="Alternar Modo Claro/Escuro">
                  {isDarkMode ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
                </button>
                <button onClick={handleReset} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md transition-all">
                  <RefreshCcw className="w-4 h-4" /> Novo Cálculo
                </button>
              </div>
            </div>
            
            <div className="max-w-7xl mx-auto flex space-x-2 overflow-x-auto">
               <button onClick={() => setActiveTab('leilao')} className={`px-6 py-3.5 font-bold text-sm rounded-t-2xl transition-all whitespace-nowrap flex items-center gap-2 ${activeTab === 'leilao' ? 'bg-slate-50 dark:bg-slate-950 text-indigo-700 dark:text-indigo-400' : 'bg-transparent text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                 <Building className="w-4 h-4"/> Arrematação (Leilão)
               </button>
               <button onClick={() => setActiveTab('escritura')} className={`px-6 py-3.5 font-bold text-sm rounded-t-2xl transition-all whitespace-nowrap flex items-center gap-2 ${activeTab === 'escritura' ? 'bg-slate-50 dark:bg-slate-950 text-indigo-700 dark:text-indigo-400' : 'bg-transparent text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                 <FileText className="w-4 h-4"/> Compra, Venda e RGI
               </button>
            </div>
          </div>

          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8 print:pt-0 print:max-w-none">
             {activeTab === 'leilao' ? <AuctionTab data={data} updateData={updateData} /> : <DeedTab data={data} updateData={updateData} />}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
